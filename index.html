// DOCENTE APP — Dashboard multi-tab
// ═══════════════════════════════════════════════════════════════════════════
function DocenteApp({ email }) {
  const [tab, setTab] = useState("registro");
  const [studenti, setStudenti] = useState([]);
  const [votiBackend, setVotiBackend] = useState([]); // righe dal foglio plenaria
  const [loadingStudenti, setLoadingStudenti] = useState(true);
  const [loadingVoti, setLoadingVoti] = useState(true);

  const caricaStudenti = async function() {
    setLoadingStudenti(true);
    const res = await apiCall("tutti_studenti", {});
    if (res.ok) setStudenti(res.studenti || []);
    setLoadingStudenti(false);
  };

  const caricaVoti = async function() {
    setLoadingVoti(true);
    const res = await apiCall("get_voti", {});
    if (res.ok) setVotiBackend(res.voti || []);
    setLoadingVoti(false);
  };

  useEffect(function() {
    caricaStudenti();
    caricaVoti();
    // Auto-refresh ogni 20 s
    const timer = setInterval(function() { caricaStudenti(); caricaVoti(); }, 20000);
    return function() { clearInterval(timer); };
  }, []);

  const tabs = [
    ["registro",    "👥 Registro"],
    ["sintesi",     "✍️ Sintesi"],
    ["supervisione","👁 Chat & intese"],
    ["pannello",    "🎙️ Pannello Chair"],
    ["plenaria",    "🗳️ Scrutinio"],
    ["risultato",   "📊 Risultato"],
    ["diagnostica", "🔍 Diagnostica"],
    ["debriefing",  "💬 Debriefing"],
    ["archivio",    "📚 Archivio"],
    ["impostazioni","⚙️ Impostazioni"],
  ];

  return (
    <div className="main main-xwide">
      <div className="doc-tabs">
        {tabs.map(function(t) {
          return (
            <div key={t[0]} className={"doc-tab " + (tab === t[0] ? "attiva" : "")} onClick={function() { setTab(t[0]); }}>{t[1]}</div>
          );
        })}
      </div>

      {tab === "registro"     && <DocenteRegistro studenti={studenti} loading={loadingStudenti} ricarica={caricaStudenti} />}
      {tab === "sintesi"      && <DocenteSintesi />}
      {tab === "supervisione" && <DocenteSupervisioneChat />}
      {tab === "pannello"     && <DocentePannelloChair studenti={studenti} votiBackend={votiBackend} ricaricaVoti={caricaVoti} ricaricaStudenti={caricaStudenti} />}
      {tab === "plenaria"     && <DocentePlenaria votiBackend={votiBackend} ricaricaVoti={caricaVoti} />}
      {tab === "risultato"    && <DocenteRisultato studenti={studenti} votiBackend={votiBackend} />}
      {tab === "diagnostica"  && <DocenteDiagnostica />}
      {tab === "debriefing"   && <DocenteDebriefing />}
      {tab === "archivio"     && <DocenteArchivio votiBackend={votiBackend} />}
      {tab === "impostazioni" && <DocenteImpostazioni studenti={studenti} votiBackend={votiBackend} ricarica={function() { caricaStudenti(); caricaVoti(); }} />}
    </div>
  );
}

// DOCENTE / REGISTRO
// ═══════════════════════════════════════════════════════════════════════════
function DocenteRegistro({ studenti, loading, ricarica }) {
  const [studenteInModifica, setStudenteInModifica] = useState(null);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 16, color: "var(--blu)" }}>Registro della classe</div>
          <div style={{ fontSize: 13, color: "var(--testo-light)" }}>{studenti.length} studenti registrati · clicca su uno studente per modificare</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={ricarica}>🔄 Aggiorna</button>
      </div>

      {studenteInModifica && (
        <ModaleModificaStudente
          studente={studenteInModifica}
          onSalva={async function(aggiornato) {
            await apiCall("modifica_studente", aggiornato);
            setStudenteInModifica(null);
            ricarica();
          }}
          onElimina={async function() {
            await apiCall("elimina_studente", { id: studenteInModifica.id });
            setStudenteInModifica(null);
            ricarica();
          }}
          onChiudi={function() { setStudenteInModifica(null); }}
        />
      )}

      {loading ? <div className="loading">Caricamento studenti...</div> : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10, marginBottom: 20 }}>
            {PAESI.map(function(p) {
              const stP = studenti.filter(function(s) { return s.paese === p.id; });
              const pronti = stP.filter(function(s) { return s.completato; }).length;
              return (
                <div key={p.id} className="card" style={{ padding: 12, margin: 0 }}>
                  <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 13 }}>{p.emoji} {p.nome}</div>
                  <div style={{ fontSize: 11, color: "var(--testo-light)", marginBottom: 6 }}>{p.ente} · {stP.length}/4 studenti</div>
                  <div className="progress-bar"><div className="progress-fill" style={{ width: ((stP.length / 4) * 100) + "%" }} /></div>
                  {stP.length > 0 && <div style={{ fontSize: 11, color: "var(--verde)", marginTop: 4 }}>{pronti} pronti</div>}
                </div>
              );
            })}
          </div>

          <div className="dashboard-grid">
            {studenti.map(function(s) {
              const prog = ((s.sezioniVisitate && s.sezioniVisitate.length) || 0) / WG_DATA[s.wg].sezioni.length;
              const stato = s.completato ? "pronto" : prog > 0 ? "in-corso" : "non-iniziato";
              return (
                <div key={s.id} className="studente-card" style={{ cursor: "pointer", transition: "box-shadow 0.15s" }}
                  onClick={function() { setStudenteInModifica(s); }}
                  onMouseEnter={function(e) { e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.1)"; }}
                  onMouseLeave={function(e) { e.currentTarget.style.boxShadow = ""; }}>
                  <div className="studente-card-header">
                    <div style={{ flex: 1 }}>
                      <div className="studente-nome">{s.emoji} {s.nome} {s.cognome}</div>
                      <div className="studente-paese">{s.paeseName} / {s.ente}</div>
                    </div>
                    <span className="wg-badge" style={{ background: WG_DATA[s.wg].colore, fontSize: 10 }}>WG {s.wg}</span>
                  </div>
                  {s.isDelegatoCapo && <span className="tag tag-oro">Delegato Capo</span>}
                  <div className="progress-bar"><div className="progress-fill" style={{ width: (prog * 100) + "%", background: WG_DATA[s.wg].colore }} /></div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--testo-light)" }}>
                    <span>{(s.sezioniVisitate && s.sezioniVisitate.length) || 0}/{WG_DATA[s.wg].sezioni.length} sezioni</span>
                    <span className={"studente-stato stato-" + stato}>{stato === "pronto" ? "✅ Pronto" : stato === "in-corso" ? "⏳ In corso" : "○ Non iniziato"}</span>
                  </div>
                  {s.ballotVoto && <div style={{ fontSize: 11 }}>Voto preliminare: <strong>{s.ballotVoto}</strong></div>}
                  {s.sintesiPosizione && <div style={{ fontSize: 11, color: "var(--verde)" }}>✎ sintesi pubblicata</div>}
                  <div style={{ fontSize: 10, color: "var(--testo-light)", textAlign: "right", marginTop: 2 }}>✏️ clicca per modificare</div>
                </div>
              );
            })}
            {studenti.length === 0 && (
              <div style={{ gridColumn: "1/-1", color: "var(--testo-light)", fontSize: 14, padding: 20 }}>
                Nessuno studente ancora registrato. Chiedi alla classe di accedere all'app con "Sono uno Studente" e di registrarsi selezionando lo slot (paese × WG) assegnato.
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

// ── Modale di modifica studente ────────────────────────────────────────────
function ModaleModificaStudente({ studente, onSalva, onElimina, onChiudi }) {
  const [nome, setNome] = useState(studente.nome);
  const [cognome, setCognome] = useState(studente.cognome);
  const [paese, setPaese] = useState(studente.paese);
  const [wg, setWg] = useState(String(studente.wg));
  const [step, setStep] = useState("form");
  const [errore, setErrore] = useState("");

  const handleSalva = async function() {
    if (!nome.trim() || !cognome.trim() || !paese || !wg) { setErrore("Compila tutti i campi."); return; }
    const paeseObj = PAESI.filter(function(p) { return p.id === paese; })[0];
    const agg = {
      id: studente.id,
      nome: nome.trim(), cognome: cognome.trim(),
      paese: paese, paeseName: paeseObj.nome, ente: paeseObj.ente, emoji: paeseObj.emoji,
      wg: parseInt(wg), isDelegatoCapo: parseInt(wg) === 4,
    };
    onSalva(agg);
  };

  if (step === "conferma-elimina") {
    return (
      <ModaleConferma
        titolo="Eliminare lo studente?"
        messaggio={"Stai per eliminare definitivamente " + studente.nome + " " + studente.cognome + ". L'operazione non è reversibile."}
        onConferma={onElimina}
        onAnnulla={function() { setStep("form"); }}
        pericoloso={true}
      />
    );
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ background: "white", borderRadius: 8, padding: 28, maxWidth: 460, width: "100%", boxShadow: "0 8px 40px rgba(0,0,0,0.2)", borderTop: "4px solid var(--blu)" }}>
        <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 17, color: "var(--blu)", marginBottom: 16 }}>Modifica studente</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div className="form-group">
            <label className="form-label">Nome</label>
            <input className="form-input" value={nome} onChange={function(e) { setNome(e.target.value); }} />
          </div>
          <div className="form-group">
            <label className="form-label">Cognome</label>
            <input className="form-input" value={cognome} onChange={function(e) { setCognome(e.target.value); }} />
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Paese</label>
          <select className="form-input form-select" value={paese} onChange={function(e) { setPaese(e.target.value); }}>
            {PAESI.map(function(p) { return <option key={p.id} value={p.id}>{p.emoji} {p.nome} ({p.ente})</option>; })}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">WG</label>
          <select className="form-input form-select" value={wg} onChange={function(e) { setWg(e.target.value); }}>
            <option value="1">WG 1 — Remote ID</option>
            <option value="2">WG 2 — Limiti operativi</option>
            <option value="3">WG 3 — Certificazione</option>
            <option value="4">WG 4 — Campo di applicazione + Delegato Capo</option>
          </select>
        </div>
        {errore && <div className="form-error" style={{ marginBottom: 8 }}>{errore}</div>}
        <div style={{ display: "flex", gap: 8, justifyContent: "space-between" }}>
          <button className="btn btn-danger btn-sm" onClick={function() { setStep("conferma-elimina"); }}>🗑 Elimina</button>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn btn-ghost" onClick={onChiudi}>Annulla</button>
            <button className="btn btn-primary" onClick={handleSalva}>Salva</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ModaleConferma({ titolo, messaggio, onConferma, onAnnulla, pericoloso, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ background: "white", borderRadius: 8, padding: 28, maxWidth: 440, width: "100%", boxShadow: "0 8px 40px rgba(0,0,0,0.2)", borderTop: "4px solid " + (pericoloso ? "var(--rosso)" : "var(--blu)") }}>
        <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 17, color: pericoloso ? "var(--rosso)" : "var(--blu)", marginBottom: 10 }}>{titolo}</div>
        <div style={{ fontSize: 14, lineHeight: 1.7, color: "var(--testo)", marginBottom: 16 }}>{messaggio}</div>
        {children}
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
          <button className="btn btn-ghost" onClick={onAnnulla}>Annulla</button>
          <button className={"btn " + (pericoloso ? "btn-danger" : "btn-primary")} onClick={onConferma}>Conferma</button>
        </div>
      </div>
    </div>
  );
}

// DOCENTE / PANNELLO CHAIR — timer + registro interventi + iniezioni
// ═══════════════════════════════════════════════════════════════════════════
function DocentePannelloChair({ studenti, votiBackend, ricaricaVoti, ricaricaStudenti }) {
  const [faseAttiva, setFaseAttiva] = useState("C1");
  const [secRimanenti, setSecRimanenti] = useState(FASI_PLENARIA[0].durataMin * 60);
  const [running, setRunning] = useState(false);
  const [interventi, setInterventi] = useState([]);
  const [loadingInt, setLoadingInt] = useState(true);
  const intervalRef = useRef(null);

  // Carica interventi dal backend
  const caricaInterventi = async function() {
    setLoadingInt(true);
    const res = await apiCall("get_interventi", {});
    if (res.ok) setInterventi(res.interventi || []);
    setLoadingInt(false);
  };

  useEffect(function() {
    caricaInterventi();
    const t = setInterval(caricaInterventi, 15000);
    return function() { clearInterval(t); };
  }, []);

  // Timer
  useEffect(function() {
    if (running) {
      intervalRef.current = setInterval(function() {
        setSecRimanenti(function(prev) {
          if (prev <= 0) { setRunning(false); return 0; }
          return prev - 1;
        });
      }, 1000);
    } else {
      if (intervalRef.current) clearInterval(intervalRef.current);
    }
    return function() { if (intervalRef.current) clearInterval(intervalRef.current); };
  }, [running]);

  const selezionaFase = function(id) {
    const f = FASI_PLENARIA.filter(function(x) { return x.id === id; })[0];
    setFaseAttiva(id);
    setSecRimanenti(f.durataMin * 60);
    setRunning(false);
  };

  const faseObj = FASI_PLENARIA.filter(function(f) { return f.id === faseAttiva; })[0];
  const mm = String(Math.floor(secRimanenti / 60)).padStart(2, "0");
  const ss = String(secRimanenti % 60).padStart(2, "0");
  const classeTimer = secRimanenti <= 60 ? "danger" : secRimanenti <= 180 ? "warning" : "";

  const registraInt = async function(paese) {
    const capo = studenti.filter(function(s) { return s.paese === paese && parseInt(s.wg) === 4; })[0];
    await apiCall("registra_intervento", {
      paese: paese,
      studenteId: capo ? capo.id : "",
      nomeStudente: capo ? (capo.nome + " " + capo.cognome) : "",
      fase: faseAttiva,
      note: "",
    });
    caricaInterventi();
  };

  // Conteggio interventi per paese
  const conteggio = {};
  PAESI.forEach(function(p) { conteggio[p.id] = 0; });
  interventi.forEach(function(i) { if (i.paese) conteggio[i.paese] = (conteggio[i.paese] || 0) + 1; });

  // Voti preliminari dal backend (campo votoPreliminare)
  const votoPrelim = function(paese) {
    const r = votiBackend.filter(function(v) { return v.paese === paese; })[0];
    return r ? (r.votoPreliminare || "") : "";
  };

  return (
    <div className="chair-layout">
      {/* COLONNA SINISTRA — timer e controllo fasi */}
      <div>
        <div className="chair-timer">
          <div>
            <div className="chair-timer-label">Fase attiva</div>
            <div className="chair-timer-fase">{faseObj.id} · {faseObj.nome}</div>
            <div className="chair-timer-desc">{faseObj.descrizione}</div>
          </div>

          <div className={"chair-timer-display " + classeTimer}>{mm}:{ss}</div>

          <div className="chair-timer-btns">
            {!running
              ? <button className="btn btn-primary btn-sm" onClick={function() { setRunning(true); }}>▶ Start</button>
              : <button className="btn btn-ghost btn-sm" style={{ color: "white", borderColor: "rgba(255,255,255,0.3)" }} onClick={function() { setRunning(false); }}>⏸ Pausa</button>
            }
            <button className="btn btn-ghost btn-sm" style={{ color: "white", borderColor: "rgba(255,255,255,0.3)" }} onClick={function() { setRunning(false); setSecRimanenti(faseObj.durataMin * 60); }}>↻ Reset</button>
          </div>

          <div>
            <div className="chair-timer-label" style={{ marginBottom: 6 }}>Cambia fase</div>
            <div className="chair-fase-picker">
              {FASI_PLENARIA.map(function(f) {
                return (
                  <button key={f.id} className={"chair-fase-btn " + (f.id === faseAttiva ? "active" : "")}
                    onClick={function() { selezionaFase(f.id); }}>{f.id} {f.nome}</button>
                );
              })}
            </div>
          </div>
        </div>

        <div className="card" style={{ marginTop: 12 }}>
          <div className="card-title" style={{ fontSize: 13 }}>🎯 Iniezioni del Chair</div>
          <div style={{ fontSize: 11, color: "var(--testo-light)", marginBottom: 10, lineHeight: 1.5 }}>
            Se un conflitto non emerge spontaneamente, usa la domanda dedicata al paese chiamato:
          </div>
          {Object.entries(WG_DATA).map(function(entry) {
            const num = entry[0], wg = entry[1];
            const confl = wg.sezioni.filter(function(s) { return s.tipo === "conflitto"; })[0];
            if (!confl) return null;
            return (
              <div key={num} className="chair-iniezione" style={{ marginBottom: 8, background: "#f0f4fa", color: "var(--testo)", borderLeftColor: wg.colore }}>
                <div className="chair-iniezione-wg" style={{ color: wg.colore }}>WG {num} · {wg.conflitto}</div>
                «{confl.domandaIniezione}»
              </div>
            );
          })}
        </div>
      </div>

      {/* COLONNA DESTRA — registro interventi */}
      <div>
        <div className="card">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div className="card-title" style={{ marginBottom: 0 }}>📝 Registro interventi</div>
            <button className="btn btn-ghost btn-sm" onClick={caricaInterventi}>🔄</button>
          </div>
          <div className="card-sub">Clicca sul paese per registrare un intervento durante la fase attiva ({faseObj.id} — {faseObj.nome}). Il conteggio è aggiornato in tempo reale.</div>

          <table className="interventi-table">
            <thead>
              <tr style={{ background: "#f5f2eb" }}>
                <th style={{ textAlign: "left", padding: "8px", fontSize: 11, fontFamily: "Syne, sans-serif", letterSpacing: "0.06em" }}>PAESE</th>
                <th style={{ textAlign: "center", padding: "8px", fontSize: 11, fontFamily: "Syne, sans-serif", letterSpacing: "0.06em" }}>INTERVENTI</th>
                <th style={{ textAlign: "center", padding: "8px", fontSize: 11, fontFamily: "Syne, sans-serif", letterSpacing: "0.06em" }}>V. PRELIM</th>
                <th style={{ textAlign: "right", padding: "8px", fontSize: 11, fontFamily: "Syne, sans-serif", letterSpacing: "0.06em" }}>AZIONE</th>
              </tr>
            </thead>
            <tbody>
              {PAESI.map(function(p) {
                const prelim = votoPrelim(p.id);
                return (
                  <tr key={p.id}>
                    <td style={{ fontFamily: "Syne, sans-serif", fontWeight: 600 }}>{p.emoji} {p.nome} <span style={{ color: "var(--testo-light)", fontWeight: 400, fontSize: 11 }}>({p.ente})</span></td>
                    <td style={{ textAlign: "center" }}><span className="interv-count">{conteggio[p.id]}</span></td>
                    <td style={{ textAlign: "center" }}>{prelim ? <span className={"ballot-sigla " + prelim} style={{ fontSize: 13 }}>{prelim}</span> : <span style={{ color: "var(--testo-light)" }}>—</span>}</td>
                    <td style={{ textAlign: "right" }}><button className="interv-btn" onClick={function() { registraInt(p.id); }}>+ Intervento</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div style={{ marginTop: 12, fontSize: 11, color: "var(--testo-light)" }}>
            Totale interventi registrati: <strong>{interventi.length}</strong>
            {interventi.length > 0 && (
              <span> · ultimo: {new Date(interventi[interventi.length - 1].timestamp).toLocaleTimeString("it-IT")}</span>
            )}
          </div>
        </div>

        <div className="card">
          <div className="card-title" style={{ fontSize: 13 }}>Storico ultimi 10 interventi</div>
          {loadingInt ? <div className="loading">Carico...</div> : (
            interventi.length === 0 ? <div style={{ fontSize: 12, color: "var(--testo-light)" }}>Nessun intervento ancora registrato.</div> :
            interventi.slice(-10).reverse().map(function(i, idx) {
              const pa = PAESI.filter(function(p) { return p.id === i.paese; })[0];
              return (
                <div key={idx} style={{ display: "flex", gap: 10, alignItems: "center", padding: "6px 0", borderBottom: idx < 9 ? "1px solid var(--bordo)" : "none", fontSize: 12 }}>
                  <span style={{ color: "var(--testo-light)", fontFamily: "Syne, sans-serif", fontWeight: 600, fontSize: 10, minWidth: 40 }}>{i.fase}</span>
                  <span style={{ flex: 1, fontFamily: "Syne, sans-serif", fontWeight: 600 }}>{pa ? pa.emoji + " " + pa.nome : i.paese}</span>
                  <span style={{ color: "var(--testo-light)", fontSize: 11 }}>{new Date(i.timestamp).toLocaleTimeString("it-IT")}</span>
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DOCENTE / SCRUTINIO — voti finali
// ═══════════════════════════════════════════════════════════════════════════
function DocentePlenaria({ votiBackend, ricaricaVoti }) {
  const [processing, setProcessing] = useState(false);

  const getVoto = function(paese, campo) {
    const r = votiBackend.filter(function(v) { return v.paese === paese; })[0];
    return r ? (r[campo] || "") : "";
  };

  const setVotoFinale = async function(paese, voto) {
    setProcessing(true);
    const attuale = getVoto(paese, "votoFinale");
    // Se clicco sullo stesso voto, rimuovo
    await apiCall("set_voto_finale", { paese: paese, voto: attuale === voto ? "" : voto });
    await ricaricaVoti();
    setProcessing(false);
  };

  return (
    <div>
      <div className="plenaria-header">
        <div className="plenaria-title">🗳️ Appello nominale — Voto finale</div>
        <div className="plenaria-sub">Registra il voto dichiarato oralmente da ogni Delegato Capo. Il voto preliminare è mostrato come riferimento: evidenzia se è cambiato.</div>
      </div>

      <div className="card">
        <div className="card-title">Registrazione voti finali</div>
        <div className="card-sub">Clicca sul pulsante corrispondente al voto dichiarato in aula. Cliccando due volte sullo stesso voto lo rimuovi.</div>

        {PAESI.map(function(p) {
          const prelim = getVoto(p.id, "votoPreliminare");
          const finale = getVoto(p.id, "votoFinale");
          const cambiato = prelim && finale && prelim !== finale;
          return (
            <div key={p.id} className="voto-row">
              <div style={{ flex: 1 }}>
                <div className="voto-paese">{p.emoji} {p.nome} <span className="voto-ente">{p.ente}</span></div>
                <div style={{ fontSize: 11, marginTop: 4, display: "flex", gap: 10, alignItems: "center" }}>
                  {prelim && <span><span className="voto-prelim-label">preliminare</span> <strong style={{ fontSize: 12 }}>{prelim}</strong></span>}
                  {cambiato && <span className="voto-cambiato">⚠ cambiato in plenaria</span>}
                </div>
              </div>
              <div className="voto-btn-group">
                {["A","AC","D","AB"].map(function(v) {
                  return (
                    <button key={v}
                      className={"voto-btn " + (finale === v ? "selezionato " + v : "")}
                      onClick={function() { setVotoFinale(p.id, v); }}
                      disabled={processing}>{v}</button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="card-title">Legenda delle opzioni</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12, fontSize: 13 }}>
          <div><strong>A</strong> — Approve (favorevole, senza commenti)</div>
          <div><strong>AC</strong> — Approve with Comments (favorevole con commenti)</div>
          <div><strong>D</strong> — Disapprove (contrario, con motivazione)</div>
          <div><strong>AB</strong> — Abstain (astenuto, non conta nelle soglie)</div>
        </div>
      </div>
    </div>
  );
}

// DOCENTE / RISULTATO — calcolo ISO + export verbale + CSV valutazione
// ═══════════════════════════════════════════════════════════════════════════
function DocenteRisultato({ studenti, votiBackend }) {
  const [interventi, setInterventi] = useState([]);
  const [debriefing, setDebriefing] = useState([]);

  useEffect(function() {
    async function fetchAll() {
      const [ri, rd] = await Promise.all([
        apiCall("get_interventi", {}),
        apiCall("get_debriefing", {}),
      ]);
      if (ri.ok) setInterventi(ri.interventi || []);
      if (rd.ok) setDebriefing(rd.debriefing || []);
    }
    fetchAll();
  }, [votiBackend]);

  const votiMap = {};
  votiBackend.forEach(function(v) { if (v.votoFinale) votiMap[v.paese] = v.votoFinale; });
  const r = calcVoti(votiMap);

  const esportaVerbale = function() {
    let txt = "VERBALE SESSIONE PLENARIA SIMULATA — ISO/TC 20/SC 16\n";
    txt += "=".repeat(62) + "\n\n";
    txt += "Data: " + new Date().toLocaleDateString("it-IT") + "\n";
    txt += "Ora:  " + new Date().toLocaleTimeString("it-IT") + "\n\n";
    txt += "NWIP in votazione:\n";
    txt += "  Aerospace — UAS — Minimum requirements for remote identification,\n";
    txt += "  operational limits, operator certification and scope of application\n";
    txt += "  in non-segregated civil airspace.\n\n";
    txt += "ESITI VOTAZIONE\n" + "-".repeat(62) + "\n";
    PAESI.forEach(function(p) {
      const vp = votiBackend.filter(function(x) { return x.paese === p.id; })[0];
      const pre = vp ? (vp.votoPreliminare || "—") : "—";
      const fin = vp ? (vp.votoFinale || "—") : "—";
      const ind = pre !== fin && pre !== "—" && fin !== "—" ? "  [VOTO CAMBIATO]" : "";
      txt += p.nome.padEnd(16) + " (" + p.ente.padEnd(5) + ") preliminare: " + pre.padEnd(3) + "  finale: " + fin.padEnd(3) + ind + "\n";
    });
    txt += "\n";
    txt += "RIEPILOGO NUMERICO\n" + "-".repeat(62) + "\n";
    txt += "A  (Approve):               " + r.A + "\n";
    txt += "AC (Approve w/ Comments):   " + r.AC + "\n";
    txt += "D  (Disapprove):            " + r.D + "\n";
    txt += "AB (Abstain):               " + r.AB + "\n";
    txt += "Voti espressi (A+AC+D):     " + r.espressi + "\n";
    txt += "Voti totali  (con AB):      " + r.totali + "\n";
    txt += "Favorevoli (A+AC)/espr:     " + (r.favorevoli * 100).toFixed(1) + "%\n";
    txt += "Contrari      D/espressi:   " + (r.contrari * 100).toFixed(1) + "%\n\n";
    txt += "SOGLIE\n" + "-".repeat(62) + "\n";
    txt += "Quorum (≥5 paesi votanti):                   " + (r.quorum ? "✓ SÌ" : "✗ NO") + "\n";
    txt += "Favorevoli ≥ 2/3 dei voti espressi:          " + (r.sogFav ? "✓ SÌ" : "✗ NO") + "\n";
    txt += "Contrari ≤ 1/4 dei voti espressi:            " + (r.sogContr ? "✓ SÌ" : "✗ NO") + "\n\n";
    txt += "ESITO: " + (r.approvata ? "NWIP APPROVATA — avvio procedura WG" : "NWIP RESPINTA") + "\n\n";
    txt += "INTERVENTI IN PLENARIA\n" + "-".repeat(62) + "\n";
    if (interventi.length === 0) txt += "(nessun intervento registrato)\n";
    else {
      const contaInt = {};
      interventi.forEach(function(i) { contaInt[i.paese] = (contaInt[i.paese] || 0) + 1; });
      PAESI.forEach(function(p) { txt += p.nome.padEnd(16) + " " + (contaInt[p.id] || 0) + " interventi\n"; });
    }
    txt += "\nVerbale generato da simulazione ISO/TC 20/SC 16 — ITTL classe 3ª.\n";

    const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "verbale_plenaria_" + new Date().toISOString().slice(0,10) + ".txt";
    a.click();
    URL.revokeObjectURL(url);
  };

  const esportaCsvValutazione = function() {
    // CSV arricchito con tutti i dati utili per la valutazione individuale
    const intervByStu = {};
    interventi.forEach(function(i) {
      if (!intervByStu[i.studenteId]) intervByStu[i.studenteId] = 0;
      intervByStu[i.studenteId]++;
    });
    const dbrfByStu = {};
    debriefing.forEach(function(d) { dbrfByStu[d.studenteId] = d; });

    const header = [
      "id","cognome","nome","paese","ente","emoji",
      "wg","delegato_capo",
      "sezioni_visitate","n_sezioni","completato",
      "voto_preliminare","voto_finale","voto_cambiato",
      "sintesi_posizione","motivazione_ballot",
      "interventi_plenaria","risposta_debrief_cambio","risposta_debrief_q1","risposta_debrief_q2",
      "registrato","ultimo_accesso",
    ];

    const righe = studenti.map(function(s) {
      const votoRiga = votiBackend.filter(function(v) { return v.paese === s.paese; })[0];
      const vPrelim = votoRiga ? (votoRiga.votoPreliminare || "") : "";
      const vFinale = votoRiga ? (votoRiga.votoFinale || "") : "";
      const cambio = s.isDelegatoCapo && vPrelim && vFinale && vPrelim !== vFinale ? "SI" : "NO";
      const sv = s.sezioniVisitate || [];
      const dbrf = dbrfByStu[s.id] || {};
      return [
        s.id, s.cognome, s.nome, s.paeseName, s.ente, s.emoji,
        s.wg, s.isDelegatoCapo ? "SI" : "NO",
        (sv || []).join("+"), (sv || []).length, s.completato ? "SI" : "NO",
        vPrelim, vFinale, cambio,
        (s.sintesiPosizione || "").replace(/[\r\n]+/g, " ").replace(/"/g, '""'),
        (s.ballotMotivazione || "").replace(/[\r\n]+/g, " ").replace(/"/g, '""'),
        s.isDelegatoCapo ? (intervByStu[s.id] || 0) : "",
        dbrf.cambioPosizione || "",
        (dbrf.rispostaDomanda1 || "").replace(/[\r\n]+/g, " ").replace(/"/g, '""'),
        (dbrf.rispostaDomanda2 || "").replace(/[\r\n]+/g, " ").replace(/"/g, '""'),
        s.registrato || "", s.ultimoAccesso || "",
      ];
    });

    const csv = header.join(";") + "\n" + righe.map(function(r) {
      return r.map(function(c) {
        const s = String(c);
        if (s.indexOf(";") >= 0 || s.indexOf('"') >= 0 || s.indexOf("\n") >= 0) return '"' + s + '"';
        return s;
      }).join(";");
    }).join("\n");

    // Aggiungo BOM per Excel Italiano
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "valutazione_plenaria_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div>
      {!r.quorum && (
        <div style={{ background: "#fff8e7", border: "1px solid #d9b96a", borderLeft: "4px solid #c9a14a", padding: 16, borderRadius: 4, marginBottom: 16, fontSize: 14 }}>
          ⚠ <strong>Quorum non raggiunto.</strong> Mancano voti: sono richiesti almeno 5 paesi votanti (A + AC + D + AB) perché la votazione sia valida.
        </div>
      )}

      <div className={"risultato-box " + (r.approvata ? "risultato-approvata" : "risultato-respinta")}>
        <div className="risultato-titolo">{r.approvata ? "✓ NWIP APPROVATA" : "✗ NWIP RESPINTA"}</div>
        <div className="risultato-sub">
          {r.approvata ? "La proposta avanza allo stadio Working Draft (WD). Il TC 20/SC 16 avvia formalmente il lavoro del WG."
                       : "La proposta non ha raggiunto le soglie richieste e viene archiviata. Eventualmente ripresentabile in versione modificata."}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Riepilogo numerico</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 12 }}>
          {[
            { label: "A (Approve)", val: r.A, color: "var(--verde)" },
            { label: "AC (Approve w/ C.)", val: r.AC, color: "#2a7a5a" },
            { label: "D (Disapprove)", val: r.D, color: "var(--rosso)" },
            { label: "AB (Abstain)", val: r.AB, color: "#777" },
          ].map(function(c) {
            return (
              <div key={c.label} style={{ textAlign: "center", padding: 10, border: "1px solid var(--bordo)", borderRadius: 4 }}>
                <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 22, color: c.color }}>{c.val}</div>
                <div style={{ fontSize: 10, color: "var(--testo-light)", fontFamily: "Syne, sans-serif", fontWeight: 600 }}>{c.label}</div>
              </div>
            );
          })}
        </div>
        <div className="soglia-row"><span>Favorevoli (A + AC) ≥ 2/3 dei voti espressi</span><span className={r.sogFav ? "soglia-ok" : "soglia-no"}>{(r.favorevoli * 100).toFixed(1)}% {r.sogFav ? "✓" : "✗"}</span></div>
        <div className="soglia-row"><span>Contrari (D) ≤ 1/4 dei voti espressi</span><span className={r.sogContr ? "soglia-ok" : "soglia-no"}>{(r.contrari * 100).toFixed(1)}% {r.sogContr ? "✓" : "✗"}</span></div>
        <div className="soglia-row" style={{ borderBottom: "none" }}><span>Quorum: ≥ 5 paesi votanti (A+AC+D+AB)</span><span className={r.quorum ? "soglia-ok" : "soglia-no"}>{r.totali} {r.quorum ? "✓" : "✗"}</span></div>
      </div>

      <div className="card">
        <div className="card-title">📥 Export</div>
        <div className="card-sub">Esporta il verbale in formato testo o la tabella CSV per la valutazione individuale.</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="btn btn-primary" onClick={esportaVerbale}>📄 Verbale plenaria (TXT)</button>
          <button className="btn btn-verde" onClick={esportaCsvValutazione}>📊 CSV valutazione arricchito</button>
        </div>
        <div style={{ marginTop: 12, padding: 10, background: "#f5f2eb", borderRadius: 4, fontSize: 11, color: "var(--testo-light)", lineHeight: 1.55 }}>
          <strong>CSV valutazione — campi inclusi:</strong> anagrafica, paese/WG/ruolo, sezioni WG visitate, stato di completamento, voto preliminare e finale con flag di cambio (solo Delegati Capo), sintesi di posizione pubblicata, motivazione del ballot individuale, numero di interventi in plenaria, risposte al debriefing, timestamp di registrazione e ultimo accesso. Separatore «;» e BOM UTF-8 per compatibilità con Excel italiano.
        </div>
      </div>
    </div>
  );
}

// DOCENTE / SINTESI DI POSIZIONE — vista aggregata per paese
// ═══════════════════════════════════════════════════════════════════════════
function DocenteSintesi() {
  const [perPaese, setPerPaese] = useState({});
  const [loading, setLoading] = useState(true);
  const [paeseFiltro, setPaeseFiltro] = useState("tutti");

  const carica = async function() {
    setLoading(true);
    const res = await apiCall("sintesi_complete", {});
    if (res.ok) setPerPaese(res.perPaese || {});
    setLoading(false);
  };

  useEffect(function() {
    carica();
    const t = setInterval(carica, 20000); // refresh ogni 20 s
    return function() { clearInterval(t); };
  }, []);

  // Statistiche rapide: quante sintesi pubblicate sul totale degli iscritti
  const tutte = [].concat.apply([], Object.values(perPaese));
  const iscritti = tutte.length;
  const conSintesi = tutte.filter(function(s) { return (s.sintesiPosizione || "").trim().length > 0; }).length;

  const paesiDaMostrare = paeseFiltro === "tutti" ? PAESI : PAESI.filter(function(p) { return p.id === paeseFiltro; });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 16, color: "var(--blu)" }}>✍️ Sintesi di posizione</div>
          <div style={{ fontSize: 13, color: "var(--testo-light)" }}>
            {conSintesi} sintesi pubblicate su {iscritti} studenti iscritti. Aggiornamento automatico ogni 20 secondi.
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <select className="form-input form-select" style={{ padding: "6px 10px", fontSize: 13 }}
            value={paeseFiltro} onChange={function(e) { setPaeseFiltro(e.target.value); }}>
            <option value="tutti">Tutti i paesi</option>
            {PAESI.map(function(p) { return <option key={p.id} value={p.id}>{p.emoji} {p.nome}</option>; })}
          </select>
          <button className="btn btn-ghost btn-sm" onClick={carica}>🔄 Aggiorna</button>
        </div>
      </div>

      {loading && iscritti === 0 ? <div className="loading">Carico sintesi...</div> : (
        <>
          {paesiDaMostrare.map(function(p) {
            const membri = perPaese[p.id] || [];
            if (membri.length === 0 && paeseFiltro === "tutti") return null;
            // Tensione intra-delegazione: voti preliminari diversi
            const voti = membri.filter(function(m) { return m.ballotVoto; }).map(function(m) { return m.ballotVoto; });
            const uniciVoti = Array.from(new Set(voti));
            const haTensione = uniciVoti.length > 1;
            return (
              <div key={p.id} className="card" style={{ borderTop: "3px solid " + (haTensione ? "var(--arancio)" : "var(--blu)") }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div className="card-title" style={{ marginBottom: 0 }}>
                    {p.emoji} {p.nome} <span style={{ color: "var(--testo-light)", fontWeight: 400, fontSize: 13 }}>({p.ente})</span>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {haTensione && <span className="tag tag-ambra">⚠ tensione: {uniciVoti.join(", ")}</span>}
                    <span className="tag" style={{ background: "#eef2f8", color: "var(--blu)" }}>
                      {membri.filter(function(m) { return (m.sintesiPosizione || "").trim().length > 0; }).length}/{membri.length} sintesi
                    </span>
                  </div>
                </div>

                {membri.length === 0 ? (
                  <div style={{ fontSize: 13, color: "var(--testo-light)", fontStyle: "italic", padding: "10px 0" }}>
                    Nessuno studente registrato per questa delegazione.
                  </div>
                ) : (
                  [1,2,3,4].map(function(wgNum) {
                    const membro = membri.filter(function(m) { return m.wg === wgNum; })[0];
                    const wgInfo = WG_DATA[wgNum];
                    if (!membro) {
                      return (
                        <div key={wgNum} style={{ padding: "10px 12px", background: "#fafafa", border: "1px dashed var(--bordo)", borderRadius: 4, marginBottom: 8, fontSize: 12, color: "var(--testo-light)" }}>
                          <span style={{ fontFamily: "Syne, sans-serif", fontWeight: 600 }}>WG {wgNum}</span> — {wgInfo.titolo} · posto non assegnato
                        </div>
                      );
                    }
                    const haSintesi = (membro.sintesiPosizione || "").trim().length > 0;
                    return (
                      <div key={wgNum} style={{
                        padding: "12px 14px",
                        background: membro.isDelegatoCapo ? "linear-gradient(to right, #fffbef 0%, white 40%)" : "var(--bg)",
                        borderLeft: "3px solid " + wgInfo.colore,
                        borderRadius: "0 4px 4px 0",
                        marginBottom: 8
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6, flexWrap: "wrap", gap: 8 }}>
                          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 13, color: wgInfo.colore }}>
                            WG {wgNum} · {wgInfo.titolo}
                            {membro.isDelegatoCapo && <span style={{ color: "#6e4e0e", marginLeft: 6 }}>★ Delegato Capo</span>}
                          </div>
                          <div style={{ fontSize: 12, color: "var(--testo-light)" }}>
                            {membro.nome} {membro.cognome}
                            {membro.ballotVoto && <span style={{ marginLeft: 8 }}>· voto prelim. <span className={"ballot-sigla " + membro.ballotVoto} style={{ fontSize: 11 }}>{membro.ballotVoto}</span></span>}
                          </div>
                        </div>
                        <div style={{ fontSize: 13, lineHeight: 1.6, color: "var(--testo)" }}>
                          {haSintesi ? membro.sintesiPosizione : (
                            <span style={{ color: "var(--testo-light)", fontStyle: "italic" }}>— sintesi non ancora pubblicata —</span>
                          )}
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            );
          })}

          {iscritti === 0 && (
            <div className="card" style={{ textAlign: "center", color: "var(--testo-light)" }}>
              Nessuno studente ancora registrato.
            </div>
          )}
        </>
      )}
    </div>
  );
}

// DOCENTE / DIAGNOSTICA COERENZA DELEGAZIONI (Blocco 8)
// ═══════════════════════════════════════════════════════════════════════════
function DocenteDiagnostica() {
  const [diag, setDiag] = useState([]);
  const [loading, setLoading] = useState(true);

  const carica = async function() {
    setLoading(true);
    const res = await apiCall("diagnostica_coerenza", {});
    if (res.ok) setDiag(res.diagnostica || []);
    setLoading(false);
  };

  useEffect(function() {
    carica();
    const t = setInterval(carica, 20000);
    return function() { clearInterval(t); };
  }, []);

  const tensioni = diag.filter(function(d) { return d.tensione; });
  const coerenti = diag.filter(function(d) { return !d.tensione && d.votoDelegatoCapo; });
  const incomplete = diag.filter(function(d) { return !d.votoDelegatoCapo && d.votiEsperti && d.votiEsperti.length > 0; });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 16, color: "var(--blu)" }}>🔍 Diagnostica coerenza delegazioni</div>
          <div style={{ fontSize: 13, color: "var(--testo-light)" }}>
            Confronta in tempo reale i voti preliminari all'interno di ogni delegazione. Le tensioni sono divergenze tra i voti dei 4 membri.
          </div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={carica}>🔄 Aggiorna</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 20 }}>
        <div className="card" style={{ margin: 0, borderTop: "3px solid var(--arancio)" }}>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 32, color: "var(--arancio)" }}>{tensioni.length}</div>
          <div style={{ fontSize: 12, color: "var(--testo-light)", fontFamily: "Syne, sans-serif", fontWeight: 600, letterSpacing: "0.06em" }}>DELEGAZIONI IN TENSIONE</div>
        </div>
        <div className="card" style={{ margin: 0, borderTop: "3px solid var(--verde)" }}>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 32, color: "var(--verde)" }}>{coerenti.length}</div>
          <div style={{ fontSize: 12, color: "var(--testo-light)", fontFamily: "Syne, sans-serif", fontWeight: 600, letterSpacing: "0.06em" }}>DELEGAZIONI COERENTI</div>
        </div>
        <div className="card" style={{ margin: 0, borderTop: "3px solid var(--testo-light)" }}>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 32, color: "var(--testo-light)" }}>{incomplete.length}</div>
          <div style={{ fontSize: 12, color: "var(--testo-light)", fontFamily: "Syne, sans-serif", fontWeight: 600, letterSpacing: "0.06em" }}>CAPI SENZA VOTO</div>
        </div>
      </div>

      {loading ? <div className="loading">Caricamento diagnostica...</div> : (
        <>
          {tensioni.length > 0 && (
            <div className="card">
              <div className="card-title" style={{ color: "var(--arancio)" }}>⚠ Tensioni rilevate ({tensioni.length})</div>
              <div className="card-sub">Il voto del Delegato Capo non coincide con i voti preliminari dei compagni di delegazione. Vale la pena chiedere al Capo come ha risolto la divergenza.</div>
              {tensioni.map(function(d) {
                const p = PAESI.filter(function(x) { return x.id === d.paese; })[0];
                return (
                  <div key={d.paese} className="diag-card tensione">
                    <div className="diag-header">
                      <div className="diag-paese">{p.emoji} {p.nome} ({p.ente})</div>
                      <span className="tag tag-ambra">{d.numeroVotiUnici} voti diversi</span>
                    </div>
                    <div className="diag-voti">
                      <span className="diag-voto-pill capo">CAPO (WG4): {d.votoDelegatoCapo || "—"}</span>
                      {(d.votiEsperti || []).map(function(e, i) {
                        const isDiv = d.votoDelegatoCapo && e.voto && e.voto !== d.votoDelegatoCapo;
                        return (
                          <span key={i} className={"diag-voto-pill " + (isDiv ? "div" : "")}>
                            WG{e.wg}: {e.voto || "—"} ({e.nome.split(" ")[0]})
                          </span>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {coerenti.length > 0 && (
            <div className="card">
              <div className="card-title" style={{ color: "var(--verde)" }}>✓ Delegazioni coerenti ({coerenti.length})</div>
              {coerenti.map(function(d) {
                const p = PAESI.filter(function(x) { return x.id === d.paese; })[0];
                return (
                  <div key={d.paese} className="diag-card coerente">
                    <div className="diag-header">
                      <div className="diag-paese">{p.emoji} {p.nome} ({p.ente})</div>
                      <span className="tag tag-verde">voto unanime: {d.votoDelegatoCapo}</span>
                    </div>
                    <div className="diag-voti">
                      <span className="diag-voto-pill capo">CAPO: {d.votoDelegatoCapo}</span>
                      {(d.votiEsperti || []).map(function(e, i) {
                        return <span key={i} className="diag-voto-pill">WG{e.wg}: {e.voto || "—"}</span>;
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {incomplete.length > 0 && (
            <div className="card">
              <div className="card-title" style={{ color: "var(--testo-light)" }}>○ Delegazioni senza voto del Capo ({incomplete.length})</div>
              <div className="card-sub">I compagni hanno espresso voti preliminari, ma il Delegato Capo non ha ancora pubblicato il suo voto.</div>
              {incomplete.map(function(d) {
                const p = PAESI.filter(function(x) { return x.id === d.paese; })[0];
                return (
                  <div key={d.paese} className="diag-card">
                    <div className="diag-header">
                      <div className="diag-paese">{p.emoji} {p.nome} ({p.ente})</div>
                    </div>
                    <div className="diag-voti">
                      {(d.votiEsperti || []).map(function(e, i) {
                        return <span key={i} className="diag-voto-pill">WG{e.wg}: {e.voto || "—"}</span>;
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {diag.length === 0 && !loading && (
            <div className="card" style={{ textAlign: "center", color: "var(--testo-light)" }}>Nessuna delegazione con voti preliminari registrati.</div>
          )}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DOCENTE / DEBRIEFING AGGREGATO (Blocco 7)
// ═══════════════════════════════════════════════════════════════════════════
function DocenteDebriefing() {
  const [risposte, setRisposte] = useState([]);
  const [loading, setLoading] = useState(true);

  const carica = async function() {
    setLoading(true);
    const res = await apiCall("get_debriefing", {});
    if (res.ok) setRisposte(res.debriefing || []);
    setLoading(false);
  };

  useEffect(function() {
    carica();
    const t = setInterval(carica, 20000);
    return function() { clearInterval(t); };
  }, []);

  // Statistiche cambio posizione
  const stats = { "Sì, ho cambiato voto": 0, "No, stesso voto": 0, "No, ma stavo per farlo": 0 };
  risposte.forEach(function(r) { if (r.cambioPosizione && stats[r.cambioPosizione] !== undefined) stats[r.cambioPosizione]++; });
  const tot = risposte.length;

  const domande = DOMANDE_DEBRIEFING.filter(function(d) { return d.tipo === "aperta"; });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 16, color: "var(--blu)" }}>💬 Debriefing post-plenaria</div>
          <div style={{ fontSize: 13, color: "var(--testo-light)" }}>{tot} risposte ricevute</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={carica}>🔄 Aggiorna</button>
      </div>

      {loading ? <div className="loading">Carico risposte...</div> : tot === 0 ? (
        <div className="card" style={{ textAlign: "center", color: "var(--testo-light)" }}>
          Nessuna risposta al debriefing ancora inviata. Gli studenti possono compilare il debriefing dalla loro dashboard al termine della plenaria.
        </div>
      ) : (
        <>
          <div className="card">
            <div className="card-title">📊 Cambio di posizione tra voto preliminare e finale</div>
            {Object.entries(stats).map(function(entry) {
              const et = entry[0], n = entry[1];
              const perc = tot > 0 ? (n / tot) * 100 : 0;
              return (
                <div key={et} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                    <span>{et}</span>
                    <span style={{ fontFamily: "Syne, sans-serif", fontWeight: 700 }}>{n} ({perc.toFixed(0)}%)</span>
                  </div>
                  <div className="progress-bar"><div className="progress-fill" style={{ width: perc + "%", background: "var(--blu-light)" }} /></div>
                </div>
              );
            })}
          </div>

          {domande.map(function(d, di) {
            const risDomanda = risposte.map(function(r) {
              return { id: r.studenteId, nome: r.nomeStudente, paese: r.paese, wg: r.wg, risposta: r["rispostaDomanda" + (di + 1)] };
            }).filter(function(r) { return r.risposta && r.risposta.trim().length > 0; });

            return (
              <div key={d.id} className="card">
                <div className="card-title">Q{di + 1}. {d.domanda}</div>
                <div className="card-sub">{risDomanda.length} risposte</div>
                {risDomanda.length === 0 ? (
                  <div style={{ fontSize: 13, color: "var(--testo-light)", fontStyle: "italic" }}>Nessuna risposta per questa domanda.</div>
                ) : (
                  risDomanda.map(function(r, i) {
                    const p = PAESI.filter(function(x) { return x.id === r.paese; })[0];
                    return (
                      <div key={i} style={{ padding: "12px 14px", background: "var(--bg)", borderLeft: "3px solid var(--blu-light)", borderRadius: "0 4px 4px 0", marginBottom: 8 }}>
                        <div style={{ fontSize: 11, color: "var(--testo-light)", fontFamily: "Syne, sans-serif", fontWeight: 600, marginBottom: 4 }}>
                          {p ? p.emoji + " " + p.nome : r.paese} · WG {r.wg} · {r.nome}
                        </div>
                        <div style={{ fontSize: 13, lineHeight: 1.55 }}>{r.risposta}</div>
                      </div>
                    );
                  })
                )}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

// DOCENTE / ARCHIVIO PLENARIE (Blocco 9)
// ═══════════════════════════════════════════════════════════════════════════
function DocenteArchivio({ votiBackend }) {
  const [archivio, setArchivio] = useState([]);
  const [loading, setLoading] = useState(true);
  const [classe, setClasse] = useState("");
  const [anno, setAnno] = useState("");
  const [note, setNote] = useState("");
  const [confermaArchivio, setConfermaArchivio] = useState(false);

  const carica = async function() {
    setLoading(true);
    const res = await apiCall("lista_archivio", {});
    if (res.ok) setArchivio(res.archivio || []);
    setLoading(false);
  };

  useEffect(function() { carica(); }, []);

  const archivia = async function() {
    const voti = {}; const movimento = {};
    PAESI.forEach(function(p) {
      const r = votiBackend.filter(function(v) { return v.paese === p.id; })[0];
      voti[p.id] = r ? (r.votoFinale || "") : "";
      movimento[p.id] = { preliminare: r ? (r.votoPreliminare || "") : "", finale: r ? (r.votoFinale || "") : "" };
    });
    const calc = calcVoti(voti);
    await apiCall("archivia_plenaria", {
      classe: classe, annoScolastico: anno, note: note,
      voti: voti, movimentoVoti: movimento,
      esito: calc.approvata ? "APPROVATA" : (calc.quorum ? "RESPINTA" : "NON VALIDA"),
      favorevoli: calc.A + calc.AC,
      contrari: calc.D,
      astensioni: calc.AB,
    });
    setClasse(""); setAnno(""); setNote(""); setConfermaArchivio(false);
    carica();
  };

  return (
    <div>
      {confermaArchivio && (
        <ModaleConferma
          titolo="Archiviare la plenaria corrente?"
          messaggio="Verrà creato uno snapshot con i voti finali, il movimento preliminare→finale e le statistiche. Questa operazione non rimuove i dati correnti: puoi continuare a lavorare sulla stessa plenaria o resettarla dalle Impostazioni."
          onConferma={archivia}
          onAnnulla={function() { setConfermaArchivio(false); }}
        />
      )}

      <div className="card">
        <div className="card-title">📚 Archivio plenarie</div>
        <div className="card-sub">Salva la plenaria corrente come snapshot confrontabile con plenarie di altre classi o anni scolastici.</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div className="form-group">
            <label className="form-label">Classe</label>
            <input className="form-input" value={classe} onChange={function(e) { setClasse(e.target.value); }} placeholder="es. 3A ITTL" />
          </div>
          <div className="form-group">
            <label className="form-label">Anno scolastico</label>
            <input className="form-input" value={anno} onChange={function(e) { setAnno(e.target.value); }} placeholder="es. 2025/26" />
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Note (opzionale)</label>
          <textarea className="form-input form-textarea" value={note} onChange={function(e) { setNote(e.target.value); }} placeholder="Osservazioni particolari, riflessioni, elementi notevoli di questa plenaria..." style={{ minHeight: 70 }} />
        </div>
        <button className="btn btn-primary" onClick={function() { setConfermaArchivio(true); }} disabled={!classe.trim() || !anno.trim()}>📥 Archivia plenaria corrente</button>
      </div>

      <div className="card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div className="card-title" style={{ marginBottom: 0 }}>Plenarie archiviate ({archivio.length})</div>
          <button className="btn btn-ghost btn-sm" onClick={carica}>🔄</button>
        </div>
        <hr className="divider" />

        {loading ? <div className="loading">Caricamento...</div> : archivio.length === 0 ? (
          <div style={{ color: "var(--testo-light)", fontSize: 13 }}>Nessuna plenaria archiviata. Archivia la prima quando hai completato lo scrutinio.</div>
        ) : (
          archivio.slice().reverse().map(function(a) {
            const voti = a.voti || {};
            return (
              <div key={a.id} className="archivio-item">
                <div className="archivio-header">
                  <div>
                    <div className="archivio-titolo">{a.classe} · {a.annoScolastico}</div>
                    <div className="archivio-meta">{new Date(a.dataPlenaria).toLocaleString("it-IT")}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <span className={"tag " + (a.esito === "APPROVATA" ? "tag-verde" : a.esito === "RESPINTA" ? "tag-rosso" : "tag-ambra")}>{a.esito}</span>
                    <div style={{ fontSize: 11, color: "var(--testo-light)", marginTop: 4 }}>Fav. {a.favorevoli} · Contr. {a.contrari} · Ast. {a.astensioni}</div>
                  </div>
                </div>
                <div className="archivio-stats">
                  {PAESI.map(function(p) {
                    const v = voti[p.id] || "";
                    return (
                      <div key={p.id} className={"archivio-voto-cella " + (v || "vuoto")} title={p.nome + " (" + p.ente + ")"}>
                        <div style={{ fontSize: 10, opacity: 0.7, fontFamily: "Syne, sans-serif", fontWeight: 700, marginBottom: 2 }}>{p.id}</div>
                        <div>{v || "—"}</div>
                      </div>
                    );
                  })}
                </div>
                {a.note && (
                  <div style={{ marginTop: 10, padding: "8px 10px", background: "var(--bg)", borderRadius: 4, fontSize: 12, fontStyle: "italic", color: "var(--testo-light)" }}>
                    « {a.note} »
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DOCENTE / IMPOSTAZIONI
// ═══════════════════════════════════════════════════════════════════════════
function DocenteImpostazioni({ studenti, votiBackend, ricarica }) {
  const [confermaResetPlen, setConfermaResetPlen] = useState(false);
  const [confermaResetTotale, setConfermaResetTotale] = useState(false);
  const [msg, setMsg] = useState("");

  const votiFinali = votiBackend.filter(function(v) { return v.votoFinale; }).length;
  const votiPrelim = votiBackend.filter(function(v) { return v.votoPreliminare; }).length;

  return (
    <div>
      {confermaResetPlen && (
        <ModaleConferma
          titolo="Reset della plenaria corrente?"
          messaggio="Saranno rimossi: voti preliminari e finali di tutti i paesi, registro interventi, risposte al debriefing. Gli studenti registrati restano invariati. L'archivio non viene toccato. L'operazione non è reversibile."
          onConferma={async function() { await apiCall("reset_plenaria", {}); setConfermaResetPlen(false); setMsg("Plenaria resettata."); ricarica(); setTimeout(function() { setMsg(""); }, 3000); }}
          onAnnulla={function() { setConfermaResetPlen(false); }}
          pericoloso={true}
        />
      )}
      {confermaResetTotale && (
        <ModaleConferma
          titolo="Reset TOTALE della simulazione?"
          messaggio="Saranno rimossi TUTTI i dati: studenti, voti, interventi, debriefing. L'archivio delle plenarie resta intatto. Usa questa opzione solo per iniziare con una nuova classe. L'operazione non è reversibile."
          onConferma={async function() { await apiCall("reset_totale", {}); setConfermaResetTotale(false); setMsg("Reset totale eseguito."); ricarica(); setTimeout(function() { setMsg(""); }, 3000); }}
          onAnnulla={function() { setConfermaResetTotale(false); }}
          pericoloso={true}
        />
      )}

      <div className="card">
        <div className="card-title">⚙️ Stato della simulazione</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
          {[
            { lab: "STUDENTI REGISTRATI", val: studenti.length, lim: "/28" },
            { lab: "PREPARAZIONE PRONTA", val: studenti.filter(function(s) { return s.completato; }).length, lim: "/" + studenti.length },
            { lab: "VOTI PRELIMINARI",    val: votiPrelim, lim: "/7" },
            { lab: "VOTI FINALI",          val: votiFinali, lim: "/7" },
          ].map(function(c) {
            return (
              <div key={c.lab} style={{ padding: 12, border: "1px solid var(--bordo)", borderRadius: 4, textAlign: "center" }}>
                <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 24, color: "var(--blu)" }}>{c.val}<span style={{ fontSize: 14, color: "var(--testo-light)", fontWeight: 400 }}>{c.lim}</span></div>
                <div style={{ fontSize: 10, fontFamily: "Syne, sans-serif", fontWeight: 600, letterSpacing: "0.06em", color: "var(--testo-light)" }}>{c.lab}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="card-title" style={{ color: "var(--rosso)" }}>🗑 Reset</div>
        <div className="card-sub">Operazioni distruttive. Usare con cautela.</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <button className="btn btn-danger" onClick={function() { setConfermaResetPlen(true); }}>🔄 Reset plenaria corrente (mantiene studenti)</button>
          <button className="btn btn-danger" onClick={function() { setConfermaResetTotale(true); }}>⚠️ Reset TOTALE (cancella anche gli studenti)</button>
        </div>
        {msg && <div style={{ marginTop: 12, padding: 10, background: "#e8f5ee", color: "var(--verde)", borderRadius: 4, fontSize: 13 }}>{msg}</div>}
      </div>

      <div className="card">
        <div className="card-title">📘 Configurazione backend</div>
        <div style={{ fontSize: 13, lineHeight: 1.65, color: "var(--testo)" }}>
          Per modificare il codice di accesso docente, modifica la costante <code style={{ background: "var(--bg)", padding: "2px 6px", borderRadius: 3 }}>DOCENTE_CODE</code> nel codice Apps Script del Foglio Google e ridistribuisci il deployment come nuova versione (<em>Deploy → Gestisci deployment → matita → Versione: Nuova versione</em>).
          <br /><br />
          L'array <code style={{ background: "var(--bg)", padding: "2px 6px", borderRadius: 3 }}>DOCENTE_EMAILS</code> resta disponibile come meccanismo di fallback: funziona solo se il backend riesce a leggere l'identità Google del chiamante, cosa che di norma non avviene con il deploy "Chiunque" necessario per gli studenti.
          <br /><br />
          Per configurare l'URL del backend o reinizializzare la struttura dati, consulta il file <code style={{ background: "var(--bg)", padding: "2px 6px", borderRadius: 3 }}>ISTRUZIONI_SETUP.md</code> fornito insieme all'applicazione.
        </div>
      </div>
    </div>
  );
}
