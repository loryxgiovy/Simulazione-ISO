function formattaOrarioMsg(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    return d.toLocaleString("it-IT", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });
  } catch (e) { return iso; }
}

// UTILITY: CALCOLO VOTI ISO
// ═══════════════════════════════════════════════════════════════════════════
function calcVoti(voti) {
  const vals = Object.values(voti).filter(function(v) { return !!v; });
  const A  = vals.filter(function(v) { return v === "A"; }).length;
  const AC = vals.filter(function(v) { return v === "AC"; }).length;
  const D  = vals.filter(function(v) { return v === "D"; }).length;
  const AB = vals.filter(function(v) { return v === "AB"; }).length;
  const espressi = A + AC + D;
  const totali = espressi + AB;
  const favorevoli = espressi > 0 ? ((A + AC) / espressi) : 0;
  const contrari   = espressi > 0 ? (D / espressi) : 0;
  const quorum   = totali >= 5;
  const sogFav   = favorevoli >= 2 / 3;
  const sogContr = contrari <= 0.25;
  const approvata = quorum && sogFav && sogContr && espressi > 0;
  return { A, AC, D, AB, espressi, totali, favorevoli, contrari, quorum, sogFav, sogContr, approvata };
}

// API CLIENT — comunicazione con il backend Apps Script
// ═══════════════════════════════════════════════════════════════════════════
// Usa fetch con modalità "no-cors" non praticabile (risposta opaca):
// Apps Script restituisce JSON con CORS abilitato in modalità App Web.
// Se il backend non è configurato, l'app funziona in modalità offline con un
// localStorage di emergenza (solo per lo sviluppo).

async function apiCall(action, payload) {
  if (MODALITA_OFFLINE_TEST) {
    // Fallback locale: simula le chiamate più comuni per test offline
    return apiOffline(action, payload || {});
  }
  try {
    const url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action);
    // Inietta automaticamente la password docente (se presente) in ogni richiesta.
    // Così il backend può verificare le operazioni riservate senza logica ad hoc
    // in ogni punto del frontend.
    const finalPayload = { ...(payload || {}) };
    try {
      const pwd = sessionStorage.getItem(STORAGE_DOCENTE_PWD);
      if (pwd && !finalPayload.docenteCode) finalPayload.docenteCode = pwd;
    } catch (e) {}
    const res = await fetch(url, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(finalPayload),
    });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch (e) { return { ok: false, errore: "Risposta non valida dal backend: " + text.slice(0, 200) }; }
  } catch (err) {
    return { ok: false, errore: "Errore di rete: " + err.message };
  }
}

    case "registra_studente": {
      const id = "iso_st_" + Date.now();
      const s = { ...p, id, registrato: new Date().toISOString(), sezioniVisitate: [], completato: false, ballotVoto: "", sintesiPosizione: "" };
      s.wg = parseInt(s.wg);
      s.isDelegatoCapo = s.wg === 4;
      st.push(s); offWrite(OFF_KEY_STUD, st);
      return { ok: true, studente: s };
    }
    case "get_studente": {
      const s = st.filter(function(x) { return x.id === p.id; })[0];
      return s ? { ok: true, studente: s } : { ok: false, errore: "Non trovato" };
    }
    case "aggiorna_studente": {
      const idx = st.findIndex(function(x) { return x.id === p.id; });
      if (idx < 0) return { ok: false, errore: "Non trovato" };
      st[idx] = { ...st[idx], ...p };
      offWrite(OFF_KEY_STUD, st);
      return { ok: true };
    }
    case "modifica_studente": return apiOffline("aggiorna_studente", p);
    case "elimina_studente": {
      offWrite(OFF_KEY_STUD, st.filter(function(x) { return x.id !== p.id; }));
      return { ok: true };
    }
    case "lista_delegazione": {
      return { ok: true, delegazione: st.filter(function(x) { return x.paese === p.paese; }) };
    }
    case "cerca_studente": {
      const qn = (p.nome    || "").trim().toLowerCase();
      const qc = (p.cognome || "").trim().toLowerCase();
      if (!qn && !qc) return { ok: false, errore: "Inserisci almeno nome o cognome." };
      const ris = st.filter(function(s) {
        const sn = (s.nome    || "").toLowerCase();
        const sc = (s.cognome || "").toLowerCase();
        const mN = qn ? sn.indexOf(qn) >= 0 : true;
        const mC = qc ? sc.indexOf(qc) >= 0 : true;
        return mN && mC;
      }).map(function(s) {
        return { id: s.id, nome: s.nome, cognome: s.cognome, paese: s.paese,
                 paeseName: s.paeseName, ente: s.ente, emoji: s.emoji,
                 wg: parseInt(s.wg), isDelegatoCapo: parseInt(s.wg) === 4 };
      });
      return { ok: true, risultati: ris };
    }
    case "tutti_studenti": return { ok: true, studenti: st };
    case "sintesi_complete": {
      const perPaese = {};
      PAESI.forEach(function(x) { perPaese[x.id] = []; });
      st.forEach(function(s) {
        if (!s.paese || !perPaese[s.paese]) return;
        perPaese[s.paese].push({
          id: s.id, nome: s.nome, cognome: s.cognome, wg: parseInt(s.wg),
          isDelegatoCapo: parseInt(s.wg) === 4,
          sintesiPosizione: s.sintesiPosizione || "",
          ballotVoto: s.ballotVoto || "",
          completato: !!s.completato,
        });
      });
      Object.keys(perPaese).forEach(function(k) { perPaese[k].sort(function(a,b) { return a.wg - b.wg; }); });
      return { ok: true, perPaese: perPaese };
    }
    case "set_voto_prelim":
    case "set_voto_finale": {
      const campo = action === "set_voto_prelim" ? "votoPreliminare" : "votoFinale";
      const idx = voti.findIndex(function(v) { return v.paese === p.paese; });
      if (idx < 0) {
        const nuovo = { paese: p.paese }; nuovo[campo] = p.voto;
        voti.push(nuovo);
      } else {
        voti[idx][campo] = p.voto;
      }
      offWrite(OFF_KEY_VOTI, voti);
      return { ok: true };
    }
    case "get_voti": return { ok: true, voti: voti };
    case "reset_plenaria": { offWrite(OFF_KEY_VOTI, []); offWrite(OFF_KEY_INTR, []); offWrite(OFF_KEY_DBRF, []); return { ok: true }; }
    case "registra_intervento": {
      const intr = offRead(OFF_KEY_INTR); intr.push({ ...p, timestamp: new Date().toISOString() }); offWrite(OFF_KEY_INTR, intr);
      return { ok: true };
    }
    case "get_interventi": return { ok: true, interventi: offRead(OFF_KEY_INTR) };
    case "salva_debriefing": {
      const dbrf = offRead(OFF_KEY_DBRF); dbrf.push({ ...p, timestamp: new Date().toISOString() }); offWrite(OFF_KEY_DBRF, dbrf);
      return { ok: true };
    }
    case "get_debriefing": return { ok: true, debriefing: offRead(OFF_KEY_DBRF) };
    case "diagnostica_coerenza": {
      const diag = PAESI.map(function(p) {
        const dele = st.filter(function(s) { return s.paese === p.id; });
        const capo = dele.filter(function(s) { return parseInt(s.wg) === 4; })[0];
        const esp = dele.filter(function(s) { return parseInt(s.wg) !== 4; });
        const votoCapo = capo ? (capo.ballotVoto || "") : "";
        const votiEsp = esp.map(function(e) { return { wg: parseInt(e.wg), voto: e.ballotVoto || "", nome: e.nome + " " + e.cognome }; });
        const divg = votoCapo ? votiEsp.filter(function(v) { return v.voto && v.voto !== votoCapo; }) : [];
        const tutti = [votoCapo].concat(votiEsp.map(function(v) { return v.voto; })).filter(function(v) { return !!v; });
        const unici = [...new Set(tutti)];
        return { paese: p.id, votoDelegatoCapo: votoCapo, votiEsperti: votiEsp, votiDivergenti: divg, numeroVotiUnici: unici.length, tensione: unici.length > 1 };
      });
      return { ok: true, diagnostica: diag };
    }
    case "archivia_plenaria": {
      const arc = offRead(OFF_KEY_ARCH);
      arc.push({ ...p, id: "plen_" + Date.now(), dataPlenaria: new Date().toISOString() });
      offWrite(OFF_KEY_ARCH, arc);
      return { ok: true, id: arc[arc.length-1].id };
    }
    case "lista_archivio": return { ok: true, archivio: offRead(OFF_KEY_ARCH) };
    case "reset_totale": { offWrite(OFF_KEY_STUD, []); offWrite(OFF_KEY_VOTI, []); offWrite(OFF_KEY_INTR, []); offWrite(OFF_KEY_DBRF, []); return { ok: true }; }
    default: return { ok: false, errore: "Azione offline non implementata: " + action };
  }
}

  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; background: var(--bg); border: 1px solid var(--bordo); color: var(--testo-light); }
  .tag-oro { background: rgba(201,168,76,0.15); border-color: var(--oro); color: #8a6a00; }
  .tag-verde { background: #e8f5ee; border-color: var(--verde); color: var(--verde); }
  .tag-rosso { background: #f9e4e4; border-color: var(--rosso); color: var(--rosso); }
  .tag-ambra { background: #fff4d4; border-color: var(--ambra); color: var(--ambra); }

  /* ── VISTA DI DELEGAZIONE ────────────────────────────────────────── */
  .delegazione-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 12px; }
  .delegazione-slot { background: white; border: 1px solid var(--bordo); border-radius: 4px; padding: 12px; min-height: 120px; display: flex; flex-direction: column; }
  .delegazione-slot.vuoto { background: #faf8f3; border-style: dashed; color: var(--testo-light); }
  .delegazione-slot.self { border-color: var(--oro); border-width: 2px; background: #fffbef; }
  .delegazione-slot.capo { border-top: 3px solid var(--viola); }
  .delegazione-wg { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; color: var(--testo-light); }
  .delegazione-nome { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--blu); margin-bottom: 4px; }
  .delegazione-sintesi { font-size: 12px; line-height: 1.45; color: var(--testo); flex: 1; white-space: pre-wrap; }
  .delegazione-voto { margin-top: 6px; font-size: 11px; }

  /* ── PANNELLO CHAIR ─────────────────────────────────────────────── */
  .chair-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
  @media (max-width: 900px) { .chair-layout { grid-template-columns: 1fr; } }

  .chair-timer { background: var(--blu); color: white; border-radius: 6px; padding: 18px; display: flex; flex-direction: column; gap: 12px; position: sticky; top: 16px; }
  .chair-timer-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.12em; color: var(--oro); text-transform: uppercase; }
  .chair-timer-fase { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
  .chair-timer-desc { font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.5; }
  .chair-timer-display { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 48px; text-align: center; letter-spacing: -0.02em; margin: 10px 0; }
  .chair-timer-display.warning { color: #ffb347; }
  .chair-timer-display.danger  { color: #ff6b6b; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  .chair-timer-btns { display: flex; gap: 6px; }
  .chair-timer-btns button { flex: 1; padding: 6px 8px; font-size: 11px; }

  .chair-fase-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .chair-fase-btn { padding: 5px 4px; border: 1px solid rgba(255,255,255,0.25); background: transparent; color: rgba(255,255,255,0.85); border-radius: 3px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 10px; cursor: pointer; transition: all 0.15s; }
  .chair-fase-btn.active { background: var(--oro); color: var(--blu); border-color: var(--oro); }
  .chair-fase-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

  .chair-iniezione { background: rgba(255,255,255,0.08); border-left: 2px solid var(--oro); padding: 10px 12px; border-radius: 0 3px 3px 0; font-size: 12px; font-style: italic; line-height: 1.55; }
  .chair-iniezione-wg { font-style: normal; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px; color: var(--oro); letter-spacing: 0.08em; margin-bottom: 4px; }

  .interventi-table { width: 100%; font-size: 12px; }
  .interventi-table td { padding: 6px 8px; border-bottom: 1px solid var(--bordo); }
  .interv-btn { padding: 4px 8px; border: 1px solid var(--bordo); background: white; border-radius: 3px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 11px; cursor: pointer; transition: all 0.12s; }
  .interv-btn:hover { background: var(--bg); border-color: var(--blu-light); }
  .interv-count { display: inline-block; min-width: 22px; padding: 2px 6px; background: var(--blu); color: white; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; text-align: center; }

  /* VOTI PRELIMINARI/FINALI — differenziazione visiva */
  .voto-prelim-label { display: inline-block; padding: 1px 6px; border-radius: 8px; background: #fff4d4; color: #7a5a0a; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .voto-finale-label { display: inline-block; padding: 1px 6px; border-radius: 8px; background: var(--blu); color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .voto-cambiato { color: var(--arancio); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; }

  /* ── DIAGNOSTICA COERENZA ───────────────────────────────────────── */
  .diag-card { background: white; border: 1px solid var(--bordo); border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .diag-card.tensione { border-left: 3px solid var(--arancio); background: #fff8f0; }
  .diag-card.coerente { border-left: 3px solid var(--verde); }
  .diag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .diag-paese { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--blu); }
  .diag-voti { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .diag-voto-pill { padding: 2px 8px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; border: 1px solid var(--bordo); background: white; }
  .diag-voto-pill.div { background: #fff4e0; border-color: var(--arancio); color: var(--arancio); }
  .diag-voto-pill.capo { background: var(--viola); color: white; border-color: var(--viola); }

  /* ── ARCHIVIO PLENARIE ──────────────────────────────────────────── */
  .archivio-item { background: white; border: 1px solid var(--bordo); border-radius: 6px; padding: 16px; margin-bottom: 10px; }
  .archivio-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .archivio-titolo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--blu); }
  .archivio-meta { font-size: 11px; color: var(--testo-light); margin-top: 2px; }
  .archivio-stats { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }

  .slot-paese-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; }
  .slot-wg-list { display: flex; gap: 4px; margin-top: 6px; justify-content: center; flex-wrap: wrap; }
  .slot-wg-pill { padding: 2px 6px; border-radius: 8px; font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700; }

  /* ═══ CHAT WG / DELEGAZIONE — v3.1 ═══ */
  .chat-container { background: var(--bg-card); border: 1px solid var(--bordo); border-radius: 6px; padding: 0; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
  .chat-header { background: var(--blu); color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; border-bottom: 2px solid var(--oro); }
  .chat-titolo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.02em; }
  .chat-sottotitolo { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 3px; font-style: italic; }
  .chat-stato { font-size: 11px; color: rgba(255,255,255,0.7); font-family: 'Syne', sans-serif; font-weight: 600; white-space: nowrap; }
  .chat-finestra { background: var(--bg); padding: 14px; height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid var(--bordo); }
  .chat-vuota { color: var(--testo-light); font-style: italic; text-align: center; padding: 40px 12px; font-size: 13px; }

  .msg-bubble { max-width: 82%; padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.45; border: 1px solid var(--bordo); }
  .msg-mio { background: var(--blu); color: white; align-self: flex-end; border-color: var(--blu); }
  .msg-altrui { background: var(--bg-card); align-self: flex-start; }
  .msg-sistema { background: #fdf6e0; border: 1px solid var(--oro); align-self: center; max-width: 92%; }
  .msg-eliminato { opacity: 0.55; font-style: italic; background: #fbe9e9; border-color: #c8a8a8; align-self: center; }
  .msg-header { font-size: 10px; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 10px; font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.02em; }
  .msg-mio .msg-header { color: rgba(255,255,255,0.8); }
  .msg-altrui .msg-header, .msg-sistema .msg-header { color: var(--testo-light); }
  .msg-paese, .msg-wg { font-weight: 400; opacity: 0.8; }
  .msg-testo { white-space: pre-wrap; word-break: break-word; }
  .msg-ora { font-weight: 400; opacity: 0.7; }

  .chat-input-area { background: var(--bg-card); padding: 12px 14px; }
  .chat-input-row { display: flex; gap: 8px; align-items: stretch; }
  .chat-input { flex: 1; padding: 8px 10px; border: 1px solid var(--bordo); border-radius: 4px; font-family: 'Source Serif 4', serif; font-size: 13px; resize: vertical; background: var(--bg-card); color: var(--testo); }
  .chat-input:focus { outline: none; border-color: var(--blu-light); }
  .chat-counter { text-align: right; font-size: 10px; color: var(--testo-light); margin-top: 4px; font-family: 'Syne', sans-serif; }
  .chat-errore { background: #fbe9e9; color: var(--rosso); padding: 8px 12px; border-radius: 4px; font-size: 12px; margin: 8px 0; border: 1px solid #d4a8a8; }

  /* PUNTO DI INTESA */
  .intesa-box { margin: 16px; padding: 14px 16px; background: #fdf6e0; border: 1px solid var(--oro); border-radius: 6px; }
  .intesa-box.intesa-crist { background: #e8f3eb; border-color: var(--verde); border-width: 2px; }
  .intesa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
  .intesa-titolo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--blu); letter-spacing: 0.02em; }
  .badge-crist { display: inline-block; background: var(--verde); color: white; font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; letter-spacing: 0.04em; }
  .intesa-counter { font-size: 11px; color: var(--testo-light); font-family: 'Syne', sans-serif; font-weight: 600; }
  .intesa-vuoto { color: var(--testo-light); font-size: 13px; line-height: 1.5; }
  .intesa-vuoto p { margin-bottom: 10px; }
  .intesa-testo { background: var(--bg-card); padding: 10px 12px; border-radius: 4px; border: 1px solid var(--bordo); white-space: pre-wrap; font-size: 13px; line-height: 1.55; color: var(--testo); }
  .intesa-meta { font-size: 11px; color: var(--testo-light); margin-top: 8px; font-style: italic; }
  .intesa-conferme { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--bordo); }
  .intesa-conferme-titolo { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.04em; color: var(--blu); margin-bottom: 6px; text-transform: uppercase; }
  .intesa-conferme-lista { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 12px; }
  .conferma-si { color: var(--verde); font-weight: 600; }
  .conferma-no { color: var(--testo-light); }
  .conferma-tag { font-size: 10px; opacity: 0.7; margin-left: 3px; }
  .intesa-azioni { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .intesa-warn { background: #fbe9e9; border: 1px solid #d4a8a8; color: var(--rosso); padding: 8px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 8px; }
  .intesa-textarea { width: 100%; padding: 10px; border: 1px solid var(--bordo); border-radius: 4px; font-family: 'Source Serif 4', serif; font-size: 13px; box-sizing: border-box; background: var(--bg-card); color: var(--testo); }
  .intesa-textarea:focus { outline: none; border-color: var(--blu-light); }
  .intesa-crist-msg { background: #e8f3eb; color: var(--verde); padding: 10px 12px; border-radius: 4px; margin-top: 10px; font-size: 12px; border: 1px solid var(--verde); }

  /* SUPERVISIONE DOCENTE */
  .superv-grid { display: grid; grid-template-columns: 360px 1fr; gap: 16px; margin-top: 16px; }
  .superv-panoramica { background: var(--bg-card); border: 1px solid var(--bordo); border-radius: 6px; padding: 14px; max-height: 75vh; overflow-y: auto; }
  .superv-panoramica h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; color: var(--blu); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
  .superv-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .superv-table th, .superv-table td { padding: 6px 8px; border-bottom: 1px solid var(--bordo); text-align: left; }
  .superv-table th { background: var(--blu); color: white; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }

  .superv-table tbody tr:hover { background: var(--bg); }

  .superv-dettaglio h4 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; color: var(--blu); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
  .superv-chat-window { background: var(--bg); border: 1px solid var(--bordo); border-radius: 4px; padding: 10px; height: 320px; overflow-y: auto; margin: 10px 0; }
  .superv-msg { padding: 8px 10px; margin-bottom: 6px; background: var(--bg-card); border: 1px solid var(--bordo); border-radius: 4px; font-size: 12px; }

// ═══════════════════════════════════════════════════════════════════════════
// COMPONENTI CHAT WG / DELEGAZIONE + PUNTO DI INTESA (v3.1)
// ═══════════════════════════════════════════════════════════════════════════

// ── ChatGruppo: render unificato per chat WG e chat delegazione ────────────
function ChatGruppo({ studente, tipoGruppo, gruppoId, etichetta, sottotitolo }) {
  const [messaggi, setMessaggi] = useState([]);
  const [bozza, setBozza] = useState("");
  const [inviando, setInviando] = useState(false);
  const [errore, setErrore] = useState("");
  const [caricamento, setCaricamento] = useState(true);
  const refFine = useRef(null);

  const carica = useCallback(async function() {
    const r = await apiCall("leggi_chat", {
      tipoGruppo: tipoGruppo, gruppoId: gruppoId,
      studenteId: studente.id,
    });
    if (r && r.ok) {
      setMessaggi(r.messaggi || []);
      setErrore("");
    } else if (r && r.errore) {
      setErrore(r.errore);
    }
    setCaricamento(false);
  }, [studente.id, tipoGruppo, gruppoId]);

  useEffect(function() {
    carica();
    const it = setInterval(carica, CHAT_POLLING_MS);
    return function() { clearInterval(it); };
  }, [carica]);

  useEffect(function() {
    if (refFine.current) refFine.current.scrollIntoView({ behavior: "smooth", block: "end" });
  }, [messaggi.length]);

  const invia = async function() {
    const t = bozza.trim();
    if (!t || inviando) return;
    if (t.length > CHAT_MAX_MSG_LEN) {
      setErrore("Messaggio troppo lungo (" + t.length + "/" + CHAT_MAX_MSG_LEN + ").");
      return;
    }
    setInviando(true);
    setErrore("");
    const r = await apiCall("invia_messaggio", {
      tipoGruppo: tipoGruppo, gruppoId: gruppoId,
      studenteId: studente.id, testo: t,
    });
    if (r && r.ok) {
      setBozza("");
      await carica();
    } else {
      setErrore("Errore invio: " + ((r && r.errore) || "sconosciuto"));
    }
    setInviando(false);
  };

  const onKeyDown = function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      invia();
    }
  };

  return (
    <div className="chat-container">
      <div className="chat-header">
        <div>
          <div className="chat-titolo">{etichetta}</div>
          <div className="chat-sottotitolo">{sottotitolo}</div>
        </div>
        <div className="chat-stato">
          {caricamento ? "⟳ caricamento…" : (messaggi.filter(function(m) { return !m.eliminato; }).length + " messaggi")}
        </div>
      </div>

      <div className="chat-finestra">
        {messaggi.length === 0 && !caricamento && (
          <div className="chat-vuota">
            Nessun messaggio. Inizia tu la discussione presentando la posizione della tua delegazione.
          </div>
        )}
        {messaggi.map(function(m) {
          return <MessaggioBubble key={m.id} m={m} mioId={studente.id} />;
        })}
        <div ref={refFine}></div>
      </div>

      <div className="chat-input-area">
        {errore && <div className="chat-errore">{errore}</div>}
        <div className="chat-input-row">
          <textarea
            className="chat-input"
            placeholder="Scrivi un messaggio… (Invio = invia, Shift+Invio = a capo)"
            value={bozza}
            onChange={function(e) { setBozza(e.target.value); }}
            onKeyDown={onKeyDown}
            maxLength={CHAT_MAX_MSG_LEN}
            rows={2}
            disabled={inviando}
          />
          <button className="btn btn-primary" onClick={invia} disabled={inviando || !bozza.trim()}>
            {inviando ? "Invio…" : "Invia"}
          </button>
        </div>
        <div className="chat-counter">{bozza.length}/{CHAT_MAX_MSG_LEN}</div>
      </div>

      <PuntoIntesaPanel
        studente={studente}
        tipoGruppo={tipoGruppo}
        gruppoId={gruppoId}
      />
    </div>
  );
}

// ── MessaggioBubble ─────────────────────────────────────────────────────────
function MessaggioBubble({ m, mioId }) {
  const mio = String(m.studenteId) === String(mioId);
  const sistema = !!m.sistema;
  let cls = "msg-bubble";
  if (sistema) cls += " msg-sistema";
  else if (mio) cls += " msg-mio";
  else cls += " msg-altrui";
  if (m.eliminato) cls += " msg-eliminato";

  return (
    <div className={cls}>
      <div className="msg-header">
        <span>
          {sistema ? "👨‍🏫 DOCENTE" : (m.nome || "—")}
          {!sistema && m.paese && <span className="msg-paese"> · {m.paese}</span>}
          {!sistema && m.wg && <span className="msg-wg"> · WG {m.wg}</span>}
        </span>
        <span className="msg-ora">{formattaOrarioMsg(m.timestamp)}</span>
      </div>
      <div className="msg-testo">
        {m.eliminato
          ? <em>[messaggio rimosso dal docente{m.motivoEliminazione ? ": " + m.motivoEliminazione : ""}]</em>
          : m.testo}
      </div>
    </div>
  );
}

// ── PuntoIntesaPanel ────────────────────────────────────────────────────────
function PuntoIntesaPanel({ studente, tipoGruppo, gruppoId }) {
  const [stato, setStato] = useState(null);
  const [bozza, setBozza] = useState("");
  const [modificando, setModificando] = useState(false);
  const [errore, setErrore] = useState("");
  const [salvando, setSalvando] = useState(false);

  const carica = useCallback(async function() {
    const r = await apiCall("leggi_intesa", {
      tipoGruppo: tipoGruppo, gruppoId: gruppoId,
      studenteId: studente.id,
    });
    if (r && r.ok) {
      setStato(r);
    } else if (r && r.errore) {
      setErrore(r.errore);
    }
  }, [studente.id, tipoGruppo, gruppoId]);

  useEffect(function() {
    carica();
    const it = setInterval(carica, INTESA_POLLING_MS);
    return function() { clearInterval(it); };
  }, [carica]);

  // Quando arriva un nuovo stato e NON sto modificando, sincronizzo la bozza
  useEffect(function() {
    if (!modificando && stato && stato.intesa) {
      setBozza(stato.intesa.testo || "");
    }
  }, [stato && stato.intesa && stato.intesa.testo, stato && stato.intesa && stato.intesa.timestampUltimoAgg, modificando]);

  const salva = async function() {
    const t = bozza.trim();
    if (!t) { setErrore("Il testo non può essere vuoto."); return; }
    if (t.length > CHAT_MAX_INTESA_LEN) {
      setErrore("Testo troppo lungo (" + t.length + "/" + CHAT_MAX_INTESA_LEN + ").");
      return;
    }
    setSalvando(true);
    setErrore("");
    const r = await apiCall("proponi_intesa", {
      tipoGruppo: tipoGruppo, gruppoId: gruppoId,
      studenteId: studente.id, testo: t,
    });
    if (r && r.ok) {
      setModificando(false);
      await carica();
    } else {
      setErrore("Errore: " + ((r && r.errore) || "sconosciuto"));
    }
    setSalvando(false);
  };

  const conferma = async function(val) {
    setSalvando(true);
    setErrore("");
    const r = await apiCall("conferma_intesa", {
      tipoGruppo: tipoGruppo, gruppoId: gruppoId,
      studenteId: studente.id, confermato: val,
    });
    if (!r || !r.ok) setErrore("Errore: " + ((r && r.errore) || "sconosciuto"));
    await carica();
    setSalvando(false);
  };

  if (!stato) {
    return <div className="intesa-box"><div className="muted">Caricamento punto di intesa…</div></div>;
  }

  const intesa = stato.intesa;
  const cristallizzato = intesa && intesa.cristallizzato;
  const haTesto = intesa && intesa.testo;
  const mioConferma = stato.conferme.find(function(c) { return String(c.studenteId) === String(studente.id); });
  const hoConfermato = mioConferma && mioConferma.confermato;

  return (
    <div className={"intesa-box " + (cristallizzato ? "intesa-crist" : "")}>
      <div className="intesa-header">
        <div className="intesa-titolo">
          📜 PUNTO DI INTESA DEL GRUPPO
          {cristallizzato && <span className="badge-crist">✓ CONSENSO RAGGIUNTO</span>}
        </div>
        <div className="intesa-counter">{stato.nConfermati}/{stato.nMembri} conferme</div>
      </div>

      {!haTesto && !modificando && (
        <div className="intesa-vuoto">
          <p>Nessun testo proposto. Quando il gruppo ha discusso a sufficienza, uno di voi può proporre il testo del punto di intesa.</p>
          <button className="btn btn-ghost btn-sm" onClick={function() { setBozza(""); setModificando(true); }}>
            Proponi un testo
          </button>
        </div>
      )}

      {haTesto && !modificando && (
        <div>
          <div className="intesa-testo">{intesa.testo}</div>
          <div className="intesa-meta">
            Proposto da <strong>{intesa.propostoDaNome}</strong>
            {intesa.aggiornatoDa && intesa.aggiornatoDa !== intesa.propostoDaNome && (
              <span> · ultimo aggiornamento: {intesa.aggiornatoDa}</span>
            )}
          </div>

          <div className="intesa-conferme">
            <div className="intesa-conferme-titolo">Stato delle conferme</div>
            <ul className="intesa-conferme-lista">
              {stato.membri.map(function(m) {
                const cf = stato.conferme.find(function(c) { return String(c.studenteId) === String(m.id); });
                const ok = cf && cf.confermato;
                return (
                  <li key={m.id} className={ok ? "conferma-si" : "conferma-no"}>
                    {ok ? "✓" : "○"} {m.nome} {m.cognome}
                    <span className="conferma-tag">
                      {tipoGruppo === "wg" ? "(" + m.paese + ")" : "(WG " + m.wg + ")"}
                    </span>
                  </li>
                );
              })}
            </ul>
          </div>

          {!cristallizzato && (
            <div className="intesa-azioni">
              {!hoConfermato && (
                <button className="btn btn-verde btn-sm" onClick={function() { conferma(true); }} disabled={salvando}>
                  ✓ Confermo questo testo
                </button>
              )}
              {hoConfermato && (
                <button className="btn btn-ghost btn-sm" onClick={function() { conferma(false); }} disabled={salvando}>
                  ↶ Ritira la mia conferma
                </button>
              )}
              <button className="btn btn-ghost btn-sm" onClick={function() { setBozza(intesa.testo); setModificando(true); }} disabled={salvando}>
                ✎ Modifica testo
              </button>
            </div>
          )}

          {cristallizzato && (
            <div className="intesa-crist-msg">
              ✓ Tutti i membri del gruppo hanno confermato. Il punto di intesa è ora cristallizzato. Solo il docente può riaprirlo.
            </div>
          )}
        </div>
      )}

      {modificando && (
        <div>
          <div className="intesa-warn">
            ⚠ Attenzione: modificando il testo, le conferme già date saranno invalidate e tutti i membri dovranno riconfermare.
          </div>
          <textarea
            className="intesa-textarea"
            value={bozza}
            onChange={function(e) { setBozza(e.target.value); }}
            maxLength={CHAT_MAX_INTESA_LEN}
            rows={5}
            placeholder="Scrivi qui il testo del punto di intesa che il gruppo intende proporre…"
            disabled={salvando}
          />
          <div className="chat-counter">{bozza.length}/{CHAT_MAX_INTESA_LEN}</div>
          <div className="intesa-azioni">
            <button className="btn btn-primary btn-sm" onClick={salva} disabled={salvando || !bozza.trim()}>
              {salvando ? "Salvataggio…" : "Salva proposta"}
            </button>
            <button className="btn btn-ghost btn-sm" onClick={function() { setModificando(false); setBozza((intesa && intesa.testo) || ""); }} disabled={salvando}>
              Annulla
            </button>
          </div>
        </div>
      )}

      {errore && <div className="chat-errore" style={{ marginTop: 10 }}>{errore}</div>}
    </div>
  );
}

// ── DocenteSupervisioneChat ─────────────────────────────────────────────────
function DocenteSupervisioneChat() {
  const [panoramica, setPanoramica] = useState([]);
  const [selezione, setSelezione] = useState(null);
  const [messaggi, setMessaggi] = useState([]);
  const [bozzaSistema, setBozzaSistema] = useState("");
  const [errore, setErrore] = useState("");
  const [intesaSel, setIntesaSel] = useState(null);

  const caricaPanoramica = useCallback(async function() {
    const r = await apiCall("panoramica_intese", {});
    if (r && r.ok) setPanoramica(r.panoramica || []);
    else if (r && r.errore) setErrore("Panoramica: " + r.errore);
  }, []);

  const caricaSelezione = useCallback(async function() {
    if (!selezione) return;
    const r1 = await apiCall("leggi_chat", { tipoGruppo: selezione.tipoGruppo, gruppoId: selezione.gruppoId });
    if (r1 && r1.ok) setMessaggi(r1.messaggi || []);
    const r2 = await apiCall("leggi_intesa", { tipoGruppo: selezione.tipoGruppo, gruppoId: selezione.gruppoId });
    if (r2 && r2.ok) setIntesaSel(r2);
  }, [selezione]);

  useEffect(function() {
    caricaPanoramica();
    const it = setInterval(caricaPanoramica, 10000);
    return function() { clearInterval(it); };
  }, [caricaPanoramica]);

  useEffect(function() {
    if (!selezione) return;
    caricaSelezione();
    const it = setInterval(caricaSelezione, CHAT_POLLING_MS);
    return function() { clearInterval(it); };
  }, [selezione, caricaSelezione]);

  const inviaSistema = async function() {
    const t = bozzaSistema.trim();
    if (!t || !selezione) return;
    const r = await apiCall("invia_messaggio", {
      tipoGruppo: selezione.tipoGruppo, gruppoId: selezione.gruppoId, testo: t,
    });
    if (r && r.ok) {
      setBozzaSistema("");
      caricaSelezione();
    } else {
      setErrore("Invio: " + ((r && r.errore) || "errore"));
    }
  };

  const elimina = async function(id) {
    const motivo = window.prompt("Motivo dell'eliminazione (opzionale, visibile come spiegazione agli studenti):", "");
    if (motivo === null) return;
    const r = await apiCall("elimina_messaggio", { id: id, motivo: motivo });
    if (!r || !r.ok) setErrore("Eliminazione: " + ((r && r.errore) || "errore"));
    caricaSelezione();
  };

  const riapri = async function() {
    if (!selezione) return;
    if (!window.confirm("Riaprire il punto di intesa annullando lo stato di consenso? Le conferme già date NON vengono cancellate.")) return;
    const r = await apiCall("riapri_intesa", { tipoGruppo: selezione.tipoGruppo, gruppoId: selezione.gruppoId });
    if (!r || !r.ok) setErrore("Riapertura: " + ((r && r.errore) || "errore"));
    caricaSelezione();
  };

  const wgRows = panoramica.filter(function(p) { return p.tipoGruppo === "wg"; });
  const delRows = panoramica.filter(function(p) { return p.tipoGruppo === "del"; });

  return (
    <div>
      <div className="card">
        <div className="card-title">👁 Supervisione chat e punti di intesa</div>
        <div className="card-sub">
          Vista in tempo reale di tutte le 11 chat (4 Working Group + 7 delegazioni nazionali). La panoramica si aggiorna automaticamente ogni 10 secondi; la chat selezionata ogni 6 secondi.
        </div>
      </div>

      <div className="superv-grid">
        <div className="superv-panoramica">
          <h3>Working Group</h3>
          <table className="superv-table">
            <thead><tr><th>Gruppo</th><th>Intesa</th><th>Conf.</th><th>Stato</th></tr></thead>
            <tbody>
              {wgRows.map(function(r) {
                const sel = selezione && selezione.gruppoId === r.gruppoId && selezione.tipoGruppo === "wg";
                return (
                  <tr key={r.gruppoId}
                      className={sel ? "superv-row-sel" : ""}
                      onClick={function() { setSelezione({ tipoGruppo: "wg", gruppoId: r.gruppoId }); }}>
                    <td>{NOMI_WG[r.gruppoId] || r.gruppoId}</td>
                    <td>{r.hasTesto ? "📜 sì" : "—"}</td>
                    <td>{r.nConfermati}/{r.nMembri}</td>
                    <td>{r.cristallizzato ? "✓ Cristallizzato" : (r.hasTesto ? "In corso" : "—")}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <h3 style={{ marginTop: 18 }}>Delegazioni</h3>
          <table className="superv-table">
            <thead><tr><th>Paese</th><th>Intesa</th><th>Conf.</th><th>Stato</th></tr></thead>
            <tbody>
              {delRows.map(function(r) {
                const sel = selezione && selezione.gruppoId === r.gruppoId && selezione.tipoGruppo === "del";
                const p = PAESI.find(function(x) { return x.id === r.gruppoId; });
                return (
                  <tr key={r.gruppoId}
                      className={sel ? "superv-row-sel" : ""}
                      onClick={function() { setSelezione({ tipoGruppo: "del", gruppoId: r.gruppoId }); }}>
                    <td>{p ? (p.emoji + " " + p.nome) : r.gruppoId}</td>
                    <td>{r.hasTesto ? "📜 sì" : "—"}</td>
                    <td>{r.nConfermati}/{r.nMembri}</td>
                    <td>{r.cristallizzato ? "✓ Cristallizzato" : (r.hasTesto ? "In corso" : "—")}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div className="superv-dettaglio">
          {!selezione && <div className="muted">Seleziona un gruppo a sinistra per vedere chat e punto di intesa.</div>}
          {selezione && (
            <div>
              <h3>
                {selezione.tipoGruppo === "wg"
                  ? (NOMI_WG[selezione.gruppoId] || selezione.gruppoId)
                  : ("Delegazione " + nomePaeseEsteso(selezione.gruppoId))}
              </h3>

              <h4>Messaggi</h4>
              <div className="superv-chat-window">
                {messaggi.length === 0 && <div className="muted">Nessun messaggio.</div>}
                {messaggi.map(function(m) {
                  let cls = "superv-msg";
                  if (m.eliminato) cls += " superv-msg-elim";
                  if (m.sistema) cls += " superv-msg-sistema";
                  return (
                    <div key={m.id} className={cls}>
                      <div className="superv-msg-head">
                        <strong>{m.sistema ? "👨‍🏫 DOCENTE" : m.nome}</strong>
                        {!m.sistema && <span> · {m.paese} · WG {m.wg}</span>}
                        <span style={{ float: "right" }}>{formattaOrarioMsg(m.timestamp)}</span>
                      </div>
                      <div className="superv-msg-body">
                        {m.eliminato
                          ? <em>[eliminato{m.motivoEliminazione ? ": " + m.motivoEliminazione : ""}] originale: {m.testo}</em>
                          : m.testo}
                      </div>
                      {!m.eliminato && !m.sistema && (
                        <button className="btn btn-danger btn-sm" onClick={function() { elimina(m.id); }} style={{ marginTop: 6 }}>
                          Elimina
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>

              <h4>Invia messaggio di sistema</h4>
              <div className="superv-input-row">
                <textarea
                  className="chat-input"
                  rows={2}
                  placeholder="Apparirà nella chat con etichetta [DOCENTE]…"
                  value={bozzaSistema}
                  onChange={function(e) { setBozzaSistema(e.target.value); }}
                  maxLength={CHAT_MAX_MSG_LEN}
                />
                <button className="btn btn-primary" onClick={inviaSistema} disabled={!bozzaSistema.trim()}>
                  Invia come DOCENTE
                </button>
              </div>

              {intesaSel && intesaSel.intesa && intesaSel.intesa.testo && (
                <div className="superv-intesa">
                  <h4>📜 Punto di intesa</h4>
                  <div className="intesa-testo">{intesaSel.intesa.testo}</div>
                  <div className="muted" style={{ marginTop: 8 }}>
                    Proposto da: {intesaSel.intesa.propostoDaNome} · {intesaSel.nConfermati}/{intesaSel.nMembri} conferme
                    {intesaSel.intesa.cristallizzato && " · ✓ CRISTALLIZZATO"}
                  </div>
                  {intesaSel.intesa.cristallizzato && (
                    <button className="btn btn-ghost btn-sm" onClick={riapri} style={{ marginTop: 10 }}>
                      ↺ Riapri (annulla cristallizzazione)
                    </button>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {errore && <div className="chat-errore" style={{ marginTop: 12 }}>{errore}</div>}
    </div>
  );
}

// COMPONENTE ROOT
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [modalita, setModalita] = useState(null);
  const [loading, setLoading] = useState(true);
  const [studenteCorrente, setStudenteCorrente] = useState(null);
  const [docenteAuth, setDocenteAuth] = useState(false);
  const [emailDocente, setEmailDocente] = useState("");

  useEffect(function() {
    // Prova a recuperare la sessione studente e verifica che lo studente
    // esista ancora sul backend (il docente potrebbe averlo modificato).
    async function init() {
      const saved = sessionStorage.getItem(STORAGE_SESSIONE);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          const fresh = await apiCall("get_studente", { id: parsed.id });
          if (fresh.ok) {
            setStudenteCorrente(fresh.studente);
            setModalita("studente");
            setLoading(false);
            return;
          }
        } catch (e) {}
        sessionStorage.removeItem(STORAGE_SESSIONE);
      }
      // Controlla se il docente era già autenticato in questa sessione.
      // Richiediamo sia il flag sia la password: senza password la verifica
      // fallirebbe (il backend autorizza solo se riceve il DOCENTE_CODE corretto).
      const docSaved = sessionStorage.getItem(STORAGE_DOCENTE);
      const pwdSaved = sessionStorage.getItem(STORAGE_DOCENTE_PWD);
      if (docSaved && pwdSaved) {
        const verifica = await apiCall("verifica_docente", {});
        if (verifica.ok && verifica.autorizzato) {
          setDocenteAuth(true);
          setEmailDocente(verifica.email);
          setModalita("docente");
          setLoading(false);
          return;
        } else {
          // Password non più valida: ripulisci lo stato
          sessionStorage.removeItem(STORAGE_DOCENTE);
          sessionStorage.removeItem(STORAGE_DOCENTE_PWD);
        }
      }
      setModalita("landing");
      setLoading(false);
    }
    init();
  }, []);

  const handleLogout = function() {
    sessionStorage.removeItem(STORAGE_SESSIONE);
    sessionStorage.removeItem(STORAGE_DOCENTE);
    sessionStorage.removeItem(STORAGE_DOCENTE_PWD);
    setStudenteCorrente(null);
    setDocenteAuth(false);
    setEmailDocente("");
    setModalita("landing");
  };

  if (loading) return (
    <>
      <style>{css}</style>
      <div className="app"><div className="loading">Caricamento...</div></div>
    </>
  );

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <Header
          modalita={modalita}
          studente={studenteCorrente}
          docenteAuth={docenteAuth}
          emailDocente={emailDocente}
          onLogout={handleLogout}
          onHome={function() { setModalita("landing"); }}
        />
        {modalita === "landing" && (
          <Landing
            onStudente={function() { setModalita("studente-login"); }}
            onDocente={function() { setModalita("docente-login"); }}
          />
        )}
        {modalita === "studente-login" && (
          <StudenteLogin
            onLogin={function(s) {
              setStudenteCorrente(s);
              sessionStorage.setItem(STORAGE_SESSIONE, JSON.stringify(s));
              setModalita("studente");
            }}
            onBack={function() { setModalita("landing"); }}
          />
        )}
        {modalita === "studente" && studenteCorrente && (
          <StudenteApp studente={studenteCorrente} onUpdate={setStudenteCorrente} />
        )}
        {modalita === "docente-login" && (
          <DocenteLogin
            onLogin={function(email) {
              setDocenteAuth(true);
              setEmailDocente(email);
              sessionStorage.setItem(STORAGE_DOCENTE, "1");
              setModalita("docente");
            }}
            onBack={function() { setModalita("landing"); }}
          />
        )}
        {modalita === "docente" && docenteAuth && (
          <DocenteApp email={emailDocente} />
        )}
      </div>
    </>
  );
}

function Header({ modalita, studente, docenteAuth, emailDocente, onLogout, onHome }) {
  const mostraLogout = studente || docenteAuth;
  return (
    <div className="header">
      <div className="header-logo" onClick={onHome} style={{ cursor: "pointer" }}>
        <div className="header-logo-badge">ISO/TC 20</div>
        <div>
          <div className="header-title">Simulazione SC 16 — UAS</div>
          <div className="header-sub">ITTL · Navigazione Aerea e Logistica · Classe 3ª</div>
        </div>
      </div>

function StudenteLogin({ onLogin, onBack }) {
  const [mode, setMode] = useState("scelta"); // "scelta" | "esistente" | "nuovo"

  if (mode === "scelta") {
    return (
      <div className="main" style={{ paddingTop: 32 }}>
        <div className="card">
          <div className="card-title">Registrazione / Accesso</div>
          <div className="card-sub">Se ti sei già registrato per questa simulazione, cerca il tuo profilo. Altrimenti procedi con una nuova registrazione.</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn btn-primary btn-full" onClick={function() { setMode("esistente"); }}>Sono già registrato</button>
            <button className="btn btn-ghost btn-full" onClick={function() { setMode("nuovo"); }}>Prima volta</button>
          </div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Torna indietro</button>
      </div>
    );
  }

  if (mode === "esistente") {
    return <StudenteRicerca onLogin={onLogin} onBack={function() { setMode("scelta"); }} />;
  }

  return <StudenteRegistrazione onLogin={onLogin} onBack={function() { setMode("scelta"); }} />;
}

function StudenteRicerca({ onLogin, onBack }) {
  const [nome, setNome] = useState("");
  const [cognome, setCognome] = useState("");
  const [errore, setErrore] = useState("");
  const [loading, setLoading] = useState(false);
  const [trovati, setTrovati] = useState([]);

  const cerca = async function() {
    if (!nome.trim() && !cognome.trim()) { setErrore("Inserisci almeno nome o cognome."); return; }
    setLoading(true); setErrore(""); setTrovati([]);
    // Endpoint pubblico dedicato: ritorna solo i campi identificativi (nome,
    // cognome, paese, wg), senza dati sensibili. Il profilo completo viene
    // poi caricato da onLogin tramite get_studente.
    const res = await apiCall("cerca_studente", { nome: nome.trim(), cognome: cognome.trim() });
    if (!res.ok) {
      setErrore(res.errore || "Errore nella ricerca. Riprova tra poco o contatta il docente.");
      setLoading(false);
      return;
    }
    const lista = res.risultati || [];
    setTrovati(lista);
    if (lista.length === 0) setErrore("Nessuno studente trovato con questi dati. Controlla l'ortografia o registrati come nuovo.");
    setLoading(false);
  };

  // Quando l'utente clicca "Accedi" su uno dei profili trovati, ricarichiamo
  // il profilo completo dal backend (con sintesi, voti, sezioni visitate)
  // prima di avviare la sessione. Così lo studente ritrova intatto il lavoro
  // svolto da un altro dispositivo.
  const accedi = async function(profilo) {
    setLoading(true); setErrore("");
    const res = await apiCall("get_studente", { id: profilo.id });
    setLoading(false);
    if (res.ok && res.studente) {
      onLogin(res.studente);
    } else {
      setErrore(res.errore || "Impossibile caricare il profilo. Riprova.");
    }
  };

  return (
    <div className="main" style={{ paddingTop: 32 }}>
      <div className="card">
        <div className="card-title">Cerca il tuo profilo</div>
        <div className="card-sub">Inserisci nome e/o cognome con cui ti sei registrato. Puoi lasciare un campo vuoto, ma per una ricerca più rapida compila entrambi.</div>
        <div className="form-group">
          <label className="form-label">Nome</label>
          <input className="form-input" value={nome} onChange={function(e) { setNome(e.target.value); }} placeholder="es. Marco" />
        </div>
        <div className="form-group">
          <label className="form-label">Cognome</label>
          <input className="form-input" value={cognome} onChange={function(e) { setCognome(e.target.value); }} placeholder="es. Rossi" />
        </div>
        {errore && <div className="form-error">{errore}</div>}
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn btn-primary" onClick={cerca} disabled={loading}>{loading ? "Cerco..." : "Cerca"}</button>
          <button className="btn btn-ghost" onClick={onBack}>Indietro</button>
        </div>
      </div>
      {trovati.length > 0 && (
        <div className="card">
          <div className="card-title">Profili trovati</div>
          <div className="card-sub">Seleziona il tuo profilo per accedere.</div>
          {trovati.map(function(s) {
            return (
              <div key={s.id} style={{ padding: "10px 0", borderBottom: "1px solid var(--bordo)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 14 }}>{s.emoji} {s.nome} {s.cognome}</div>
                  <div style={{ fontSize: 12, color: "var(--testo-light)" }}>{s.paeseName} / {s.ente} · WG {s.wg}{s.isDelegatoCapo ? " · Delegato Capo" : ""}</div>
                </div>
                <button className="btn btn-primary btn-sm" onClick={function() { accedi(s); }} disabled={loading}>Accedi</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function StudenteRegistrazione({ onLogin, onBack }) {
  const [nome, setNome] = useState("");
  const [cognome, setCognome] = useState("");
  const [paeseId, setPaeseId] = useState("");
  const [wg, setWg] = useState(null);
  const [slot, setSlot] = useState(null);
  const [loading, setLoading] = useState(true);
  const [errore, setErrore] = useState("");
  const [submitting, setSubmitting] = useState(false);

  useEffect(function() {
    async function carica() {
      const res = await apiCall("slot_liberi", {});
      if (res.ok) setSlot(res.slot);
      else setErrore(res.errore || "Impossibile caricare gli slot disponibili.");
      setLoading(false);
    }
    carica();
  }, []);

  const paeseObj = PAESI.filter(function(p) { return p.id === paeseId; })[0];

  const registra = async function() {
    if (!nome.trim() || !cognome.trim()) { setErrore("Inserisci nome e cognome."); return; }
    if (!paeseId || !wg) { setErrore("Seleziona paese e WG dallo schema."); return; }
    setSubmitting(true); setErrore("");
    const payload = {
      nome: nome.trim(),
      cognome: cognome.trim(),
      paese: paeseId,
      paeseName: paeseObj.nome,
      ente: paeseObj.ente,
      emoji: paeseObj.emoji,
      wg: wg,
    };
    const res = await apiCall("registra_studente", payload);
    if (res.ok) {
      onLogin(res.studente);
    } else {
      setErrore(res.errore || "Errore in registrazione.");
      // Ricarica gli slot per aggiornare la UI
      const ref = await apiCall("slot_liberi", {});
      if (ref.ok) setSlot(ref.slot);
    }
    setSubmitting(false);
  };

  return (
    <div className="main" style={{ paddingTop: 32 }}>
      <div className="card">
        <div className="card-title">Nuova registrazione</div>
        <div className="card-sub">Inserisci i tuoi dati e seleziona lo slot che il docente ti ha assegnato nello schema delegazioni × WG.</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div className="form-group">
            <label className="form-label">Nome</label>
            <input className="form-input" value={nome} onChange={function(e) { setNome(e.target.value); }} placeholder="Marco" />
          </div>
          <div className="form-group">
            <label className="form-label">Cognome</label>
            <input className="form-input" value={cognome} onChange={function(e) { setCognome(e.target.value); }} placeholder="Rossi" />
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Scegli il tuo slot (paese × WG)</label>
          {loading ? (
            <div className="loading" style={{ padding: 20 }}>Carico gli slot disponibili...</div>
          ) : (
            <div className="slot-grid">
              {PAESI.map(function(p) {
                const wgLiberi = slot ? (slot[p.id] || []) : [];
                const slotCompleto = wgLiberi.length === 0;
                const isSelectedPaese = paeseId === p.id;
                return (
                  <div key={p.id}
                    className={"slot-tile " + (slotCompleto ? "disabled" : "") + (isSelectedPaese ? " selected" : "")}
                    onClick={function() { if (!slotCompleto) { setPaeseId(p.id); if (wgLiberi.indexOf(wg) < 0) setWg(null); } }}>
                    <div className="slot-paese-label">{p.emoji} {p.nome}</div>
                    <div style={{ fontSize: 10, color: "var(--testo-light)" }}>{p.ente} · {wgLiberi.length}/4 slot liberi</div>
                    <div className="slot-wg-list">
                      {[1,2,3,4].map(function(n) {
                        const libero = wgLiberi.indexOf(n) >= 0;
                        const sel = isSelectedPaese && wg === n;
                        return (
                          <span key={n}
                            className={"slot-wg-pill " + (sel ? "selected-wg" : libero ? "libero" : "occupato")}
                            onClick={function(e) {
                              e.stopPropagation();
                              if (libero) { setPaeseId(p.id); setWg(n); }
                            }}>
                            WG{n}{n === 4 ? "★" : ""}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <div className="form-help">I WG barrati sono già occupati. Il simbolo ★ indica il WG 4 (Delegato Capo). Se tutti gli slot del paese sono occupati, il riquadro è disabilitato.</div>
        </div>

        {paeseId && wg && (
          <div style={{ padding: "12px 14px", background: "#fffbef", border: "1px solid var(--oro)", borderRadius: 4, fontSize: 13, marginBottom: 16 }}>
            Stai per registrarti come <strong>{paeseObj.emoji} {paeseObj.nome} ({paeseObj.ente})</strong> — WG {wg} {wg === 4 ? <em>+ Delegato Capo</em> : null}.
          </div>
        )}

        {errore && <div className="form-error" style={{ marginBottom: 8 }}>{errore}</div>}

        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn btn-primary" onClick={registra} disabled={submitting || loading}>
            {submitting ? "Registro..." : "Registrati"}
          </button>
          <button className="btn btn-ghost" onClick={onBack}>Indietro</button>
        </div>
      </div>
    </div>
  );
}

// STUDENTE APP
// ═══════════════════════════════════════════════════════════════════════════
function StudenteApp({ studente: initialStudente, onUpdate }) {
  const [studente, setStudente] = useState(initialStudente);
  const [view, setView] = useState("home");
  const wgData = WG_DATA[studente.wg];

  // Poll periodico: aggiorna lo studente dal backend per rilevare modifiche del docente
  useEffect(function() {
    const timer = setInterval(async function() {
      const res = await apiCall("get_studente", { id: studente.id });
      if (res.ok) {
        // Aggiorna solo se ci sono differenze rilevanti (per evitare sovrascrivere
        // modifiche locali in corso)
        const s = res.studente;
        if (JSON.stringify(s.sezioniVisitate) !== JSON.stringify(studente.sezioniVisitate) ||
            s.completato !== studente.completato ||
            s.ballotVoto !== studente.ballotVoto) {
          // Modifiche sensate provengono dal client stesso: non sovrascriviamo
        }
      }
    }, 30000);
    return function() { clearInterval(timer); };
  }, [studente.id]);

  const aggiornaStudente = async function(updates) {
    const updated = { ...studente, ...updates };
    setStudente(updated);
    sessionStorage.setItem(STORAGE_SESSIONE, JSON.stringify(updated));
    if (onUpdate) onUpdate(updated);
    await apiCall("aggiorna_studente", { id: updated.id, ...updates });
  };

  const segnaVisitata = async function(sezioneId) {
    if (!(studente.sezioniVisitate || []).includes(sezioneId)) {
      const nuove = [...(studente.sezioniVisitate || []), sezioneId];
      await aggiornaStudente({ sezioniVisitate: nuove });
    }
  };

  const tutteVisitate = wgData.sezioni.every(function(s) {
    return (studente.sezioniVisitate || []).includes(s.id);
  });

  const tabs = [
    ["home", "🏠 Home"],
    ["scheda", "📋 Scheda WG"],
    ["chat-wg", "💬 Chat WG"],
    ["chat-del", "🏛️ Delegazione (chat)"],
    ["ballot", "🗳️ Ballot"],
    ["delegazione", "🤝 Delegazione"],
    ["nwip", "📄 NWIP"],
    ["glossario", "📖 Glossario"],
  ];

  return (
    <div className="main">
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap", paddingTop: 12 }}>
        {tabs.map(function(tab) {
          const v = tab[0], l = tab[1];
          return (
            <button key={v} onClick={function() { setView(v); }}
              style={{
                padding: "6px 14px", border: "1px solid var(--bordo)", borderRadius: 20,
                fontFamily: "Syne, sans-serif", fontWeight: 600, fontSize: 12, cursor: "pointer",
                background: view === v ? wgData.colore : "white",
                color: view === v ? "white" : "var(--testo-light)",
                borderColor: view === v ? wgData.colore : "var(--bordo)",
                transition: "all 0.15s"
              }}>{l}</button>
          );
        })}
      </div>

      {view === "home"        && <StudenteHome studente={studente} wgData={wgData} tutteVisitate={tutteVisitate} onMarca={function() { aggiornaStudente({ completato: true }); }} onGo={setView} />}
      {view === "scheda"      && <StudenteScheda studente={studente} wgData={wgData} segnaVisitata={segnaVisitata} />}
      {view === "chat-wg"     && <TabChatWG studente={studente} />}
      {view === "chat-del"    && <TabChatDelegazione studente={studente} />}
      {view === "ballot"      && <StudenteBallot studente={studente} wgData={wgData} aggiornaStudente={aggiornaStudente} />}
      {view === "delegazione" && <StudenteDelegazione studente={studente} aggiornaStudente={aggiornaStudente} />}
      {view === "nwip"        && <NwipView />}
      {view === "glossario"   && <GlossarioView />}
    </div>
  );
}

              <div style={{ fontSize: 11, color: "var(--testo-light)", textAlign: "center", marginTop: 6 }}>Porta comunque la scheda cartacea e il Ballot Sheet alla plenaria</div>
            </>
          )}
        </div>
      )}
    </>
  );
}

        {sezione.tipo === "conflitto" && (

// STUDENTE: BALLOT
// ═══════════════════════════════════════════════════════════════════════════
function StudenteBallot({ studente, wgData, aggiornaStudente }) {
  const [voto, setVoto] = useState(studente.ballotVoto || null);
  const [motivazione, setMotivazione] = useState(studente.ballotMotivazione || "");
  const [salvato, setSalvato] = useState(false);

  const opzioni = [
    { sigla: "A",  nome: "APPROVE",               desc: "Approvo la NWIP senza condizioni" },
    { sigla: "AC", nome: "APPROVE WITH COMMENTS", desc: "Approvo ma ho commenti tecnici da allegare" },
    { sigla: "D",  nome: "DISAPPROVE",            desc: "Mi oppongo formalmente (devo motivare per iscritto)" },
    { sigla: "AB", nome: "ABSTAIN",               desc: "Mi astengo (non conta nel calcolo delle soglie)" },
  ];

  const handleVoto = function(v) { setVoto(v); setSalvato(false); };

  const salva = async function() {
    await aggiornaStudente({ ballotVoto: voto, ballotMotivazione: motivazione });
    // Registra anche il voto preliminare della delegazione se è il Delegato Capo
    if (studente.isDelegatoCapo) {
      await apiCall("set_voto_prelim", { paese: studente.paese, voto: voto });
    }
    setSalvato(true);
    setTimeout(function() { setSalvato(false); }, 2000);
  };

  return (
    <div>
      <div className="card">
        <div className="card-title">🗳️ Ballot Sheet — Voto preliminare</div>
        <div className="card-sub">Esprimi il tuo voto preliminare sulla NWIP. Il voto che conta è quello dichiarato oralmente in plenaria: questo voto preliminare serve per la preparazione e per la coerenza di delegazione.{studente.isDelegatoCapo && <> In quanto <strong>Delegato Capo</strong>, il tuo voto preliminare costituisce la prima posizione ufficiale del paese.</>}</div>

        <div className="ballot-opzioni">
          {opzioni.map(function(o) {
            return (
              <div key={o.sigla} className={"ballot-opzione " + (voto === o.sigla ? "selezionata " + o.sigla : "")} onClick={function() { handleVoto(o.sigla); }}>
                <div className={"ballot-sigla " + o.sigla}>{o.sigla}</div>
                <div className="ballot-nome">{o.nome}</div>
                <div className="ballot-desc">{o.desc}</div>
              </div>
            );
          })}
        </div>

        {voto && (
          <div style={{ padding: "12px 14px", background: "var(--bg)", border: "1px solid var(--bordo)", borderRadius: 4, marginTop: 8, marginBottom: 12 }}>
            <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: 12, marginBottom: 6, color: "var(--testo-light)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Hai selezionato: {voto}</div>
            {voto === "A"  && <div style={{ fontSize: 13, lineHeight: 1.6 }}>Stai approvando la NWIP senza riserve. Motiva comunque per iscritto perché la delegazione ritiene che valga la pena avviare questo lavoro normativo.</div>}
            {voto === "AC" && <div style={{ fontSize: 13, lineHeight: 1.6 }}>Stai approvando con commenti. <strong>È obbligatorio</strong> allegare i commenti tecnici. I commenti devono essere specifici al tema del tuo WG.</div>}
            {voto === "D"  && <div style={{ fontSize: 13, lineHeight: 1.6 }}>Stai votando contro. <strong>È obbligatorio</strong> allegare una motivazione tecnica. Un D senza motivazione non è formalmente valido nelle ISO Directives.</div>}
            {voto === "AB" && <div style={{ fontSize: 13, lineHeight: 1.6 }}>Ti stai astenendo. Il tuo voto non entrerà nel calcolo delle soglie. Spiega comunque le ragioni dell'astensione.</div>}
          </div>
        )}

        <div className="form-group">
          <label className="form-label">Motivazione sintetica (per il backend — la motivazione completa va sulla scheda cartacea)</label>
          <textarea className="form-input form-textarea" value={motivazione} onChange={function(e) { setMotivazione(e.target.value); }} placeholder="Spiega brevemente perché il tuo paese vota così..." />
        </div>

        <button className="btn btn-primary" onClick={salva} disabled={!voto}>
          {salvato ? "✓ Salvato" : "Salva voto preliminare"}
        </button>
      </div>

      <div className="card">
        <div className="card-title">Le soglie ISO per l'approvazione</div>
        <div className="card-sub">La NWIP è approvata solo se si verificano contemporaneamente tutte e tre le condizioni:</div>
        <div className="soglia-row"><span>Voti favorevoli (A + AC) ≥ 2/3 dei voti espressi</span><span style={{ color: "var(--testo-light)" }}>es. 4 su 6</span></div>
        <div className="soglia-row"><span>Voti contrari (D) ≤ 1/4 dei voti espressi</span><span style={{ color: "var(--testo-light)" }}>es. max 1–2 su 6</span></div>
        <div className="soglia-row" style={{ borderBottom: "none" }}><span>Quorum: almeno 5 paesi votanti (A+AC+D+AB)</span><span style={{ color: "var(--testo-light)" }}>AB conta per il quorum</span></div>
      </div>

      <div className="card">
        <div className="card-title">Cosa portare alla plenaria</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13 }}>
          <div>📄 Scheda WG compilata su carta (tutte le sezioni)</div>
          <div>🗳️ Ballot Sheet cartaceo compilato (voto + motivazione)</div>
          <div>❓ Almeno 2 domande da porre agli altri paesi</div>
          {studente.isDelegatoCapo && <div>📊 Riepilogo posizioni della delegazione (scheda WG 4 sezione 5)</div>}
        </div>
      </div>
    </div>
  );
}

// STUDENTE: DELEGAZIONE — Vista completa (Blocco 4)
// ═══════════════════════════════════════════════════════════════════════════
function StudenteDelegazione({ studente, aggiornaStudente }) {
  const [delegazione, setDelegazione] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sintesi, setSintesi] = useState(studente.sintesiPosizione || "");
  const [salvato, setSalvato] = useState(false);

  const carica = async function() {
    setLoading(true);
    const res = await apiCall("lista_delegazione", { paese: studente.paese });
    if (res.ok) setDelegazione(res.delegazione || []);
    setLoading(false);
  };

  useEffect(function() {
    carica();
    const timer = setInterval(carica, 15000); // refresh ogni 15 s
    return function() { clearInterval(timer); };
  }, [studente.paese]);

  const salvaSintesi = async function() {
    await aggiornaStudente({ sintesiPosizione: sintesi });
    setSalvato(true);
    setTimeout(function() { setSalvato(false); }, 2000);
    carica(); // rilegge per aggiornare la vista
  };

  const paeseObj = PAESI.filter(function(p) { return p.id === studente.paese; })[0];

  // Analisi coerenza locale (visibile allo studente)
  const votiEspressi = delegazione.filter(function(d) { return d.ballotVoto; }).map(function(d) { return d.ballotVoto; });
  const uniciVoti = [...new Set(votiEspressi)];
  const haTensione = uniciVoti.length > 1;

  return (
    <div>
      <div className="card" style={{ borderTop: "4px solid var(--viola)" }}>
        <div className="card-title">🤝 La tua delegazione: {paeseObj.emoji} {paeseObj.nome} ({paeseObj.ente})</div>
        <div className="card-sub">Qui vedi le sintesi di posizione di tutti e quattro i membri della delegazione, aggiornate in tempo reale. La posizione ufficiale del paese è determinata dal Delegato Capo (WG 4) sulla base dei contributi dei tre esperti.</div>

        {loading ? <div className="loading">Carico le posizioni della delegazione...</div> : (
          <div className="delegazione-grid">
            {[1,2,3,4].map(function(w) {
              const membro = delegazione.filter(function(d) { return parseInt(d.wg) === w; })[0];
              const isSelf = membro && membro.id === studente.id;
              if (!membro) {
                return (
                  <div key={w} className="delegazione-slot vuoto">
                    <div className="delegazione-wg">WG {w} {w === 4 ? "★" : ""}</div>
                    <div style={{ fontSize: 12, marginTop: 8 }}>— posto non ancora occupato —</div>
                  </div>
                );
              }
              return (
                <div key={w} className={"delegazione-slot " + (isSelf ? "self " : "") + (w === 4 ? "capo" : "")}>
                  <div className="delegazione-wg">WG {w} {w === 4 ? "★ Delegato Capo" : ""}</div>
                  <div className="delegazione-nome">{membro.nome} {membro.cognome}</div>
                  <div className="delegazione-sintesi">
                    {membro.sintesiPosizione
                      ? membro.sintesiPosizione
                      : <span style={{ color: "var(--testo-light)", fontStyle: "italic" }}>Posizione non ancora pubblicata</span>}
                  </div>
                  <div className="delegazione-voto">
                    {membro.ballotVoto
                      ? <span>Voto preliminare: <span className={"ballot-sigla " + membro.ballotVoto} style={{ fontSize: 13 }}>{membro.ballotVoto}</span></span>
                      : <span style={{ color: "var(--testo-light)" }}>Voto non ancora espresso</span>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {haTensione && (
          <div style={{ marginTop: 14, padding: "10px 12px", background: "#fff4e0", border: "1px solid var(--arancio)", borderLeft: "3px solid var(--arancio)", borderRadius: 4, fontSize: 12, lineHeight: 1.5 }}>
            <strong style={{ color: "var(--arancio)" }}>⚠ Attenzione — tensione interna alla delegazione.</strong> All'interno della delegazione ci sono voti preliminari diversi ({uniciVoti.join(", ")}). Confrontatevi prima della plenaria: il Delegato Capo dovrà comunque portare un unico voto ufficiale.
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-title">✍️ La tua sintesi di posizione</div>
        <div className="card-sub">Scrivi qui 3-4 righe che sintetizzano la posizione del tuo paese sul tema del tuo WG. Questa sintesi sarà visibile a tutti i membri della delegazione.</div>
        <textarea
          className="form-input form-textarea"
          value={sintesi}
          onChange={function(e) { setSintesi(e.target.value); }}
          placeholder={
            studente.wg === 1 ? "Es: L'Italia ritiene che il Remote ID debba trasmettere l'identificativo del drone e la sua posizione GPS, ma non la posizione dell'operatore a terra per ragioni di tutela della privacy (GDPR)..." :
            studente.wg === 2 ? "Es: L'Italia propone di mantenere la soglia a 250 g per garantire piena copertura della norma anche ai droni consumer più leggeri usati in ambito urbano..." :
            studente.wg === 3 ? "Es: L'Italia ritiene che l'esame sia obbligatorio solo per l'uso commerciale; per l'uso ricreativo è sufficiente un corso online con autocertificazione..." :
            "Es: L'Italia sostiene un campo di applicazione uniforme tra area urbana e rurale, per garantire applicabilità della norma e semplicità di interpretazione..."
          }
          style={{ minHeight: 120 }}
        />
        <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center" }}>
          <button className="btn btn-primary" onClick={salvaSintesi} disabled={!sintesi.trim()}>
            {salvato ? "✓ Sintesi pubblicata" : "Pubblica la sintesi"}
          </button>
          <span style={{ fontSize: 11, color: "var(--testo-light)" }}>Puoi modificare la sintesi in qualsiasi momento prima della plenaria.</span>
        </div>
      </div>

      {studente.isDelegatoCapo && (
        <div className="card" style={{ borderTop: "3px solid var(--oro)", background: "linear-gradient(to bottom, #fffbef 0%, white 30%)" }}>
          <div className="card-title" style={{ color: "#6e4e0e" }}>📜 Promemoria per il Delegato Capo</div>
          <div style={{ fontSize: 13, lineHeight: 1.65, color: "var(--testo)" }}>
            Il tuo compito in plenaria è portare <strong>un solo voto ufficiale</strong> per l'intera delegazione. Prima della sessione plenaria:
            <ol style={{ marginTop: 10, paddingLeft: 24, lineHeight: 1.7 }}>
              <li>Leggi con attenzione tutte e tre le sintesi dei tuoi compagni qui sopra.</li>
              <li>Verifica che le posizioni siano coerenti. Se ci sono divergenze (es. WG 2 vuole A, tu voterai D), discuti con la delegazione prima dell'appello nominale.</li>
              <li>Compila la sezione 5 della tua scheda cartacea con il riepilogo delle posizioni.</li>
              <li>Prepara un intervento di 3 minuti per presentare il voto e i commenti principali del paese.</li>
            </ol>
          </div>
        </div>
      )}
    </div>
  );
}

// DOCENTE LOGIN — verifica codice docente (server-side)
// ═══════════════════════════════════════════════════════════════════════════
function DocenteLogin({ onLogin, onBack }) {
  const [codice, setCodice] = useState("");
  const [loading, setLoading] = useState(false);
  const [errore, setErrore] = useState("");

  const verifica = async function() {
    const codiceTrim = (codice || "").trim();
    if (!codiceTrim) {
      setErrore("Inserisci il codice docente.");
      return;
    }
    setLoading(true);
    setErrore("");
    // Salva il codice in sessionStorage: apiCall lo inietterà come docenteCode
    // nella richiesta di verifica e in ogni chiamata successiva.
    try { sessionStorage.setItem(STORAGE_DOCENTE_PWD, codiceTrim); } catch (e) {}
    const res = await apiCall("verifica_docente", {});
    if (res.ok && res.autorizzato) {
      onLogin(res.email || "docente");
    } else if (res.ok && !res.autorizzato) {
      try { sessionStorage.removeItem(STORAGE_DOCENTE_PWD); } catch (e) {}
      setErrore("Codice non riconosciuto. Verifica di averlo digitato correttamente (maiuscole/minuscole comprese).");
    } else {
      try { sessionStorage.removeItem(STORAGE_DOCENTE_PWD); } catch (e) {}
      setErrore(res.errore || "Errore di verifica. Controlla la connessione e la configurazione di APPS_SCRIPT_URL.");
    }
    setLoading(false);
  };

  const onKeyDown = function(ev) {
    if (ev.key === "Enter" && !loading) verifica();
  };

  return (
    <div className="main" style={{ paddingTop: 32 }}>
      <div className="card">
        <div className="card-title">🔐 Accesso Docente</div>
        <div className="card-sub">L'accesso al pannello docente è riservato tramite codice segreto. Il codice è configurato dal docente nel backend Apps Script (costante <code>DOCENTE_CODE</code>) e va inserito qui sotto.</div>

        {MODALITA_OFFLINE_TEST && (
          <div style={{ padding: 12, background: "#fff4d4", border: "1px solid #d9b96a", borderRadius: 4, fontSize: 12, marginBottom: 16 }}>
            <strong>Modalità offline test attiva.</strong> Il backend Apps Script non è ancora configurato. In questa modalità l'accesso è consentito senza verifica per consentire lo sviluppo. In produzione impostare APPS_SCRIPT_URL.
          </div>
        )}

        <div style={{ marginBottom: 12 }}>
          <label className="form-label" htmlFor="docente-code-input">Codice docente</label>
          <input
            id="docente-code-input"
            type="password"
            className="form-input"
            value={codice}
            onChange={function(e) { setCodice(e.target.value); }}
            onKeyDown={onKeyDown}
            placeholder="Inserisci il codice"
            autoFocus
            disabled={loading}
          />
        </div>

        <button className="btn btn-primary btn-lg btn-full" onClick={verifica} disabled={loading}>
          {loading ? "Verifica in corso..." : "🔓 Accedi"}
        </button>

        {errore && (
          <div style={{ marginTop: 12, padding: 12, background: "#f9e4e4", border: "1px solid var(--rosso)", borderRadius: 4, fontSize: 13, color: "var(--rosso)", lineHeight: 1.5 }}>
            {errore}
          </div>
        )}

        <div style={{ marginTop: 16, padding: 12, background: "var(--bg)", borderRadius: 4, fontSize: 12, lineHeight: 1.5, color: "var(--testo-light)" }}>
          <strong>Come funziona:</strong> il codice viene inviato al backend Apps Script e confrontato con la costante <code>DOCENTE_CODE</code>. Se coincide, l'accesso è autorizzato e il codice viene conservato in sessionStorage per tutta la sessione del browser, in modo che le operazioni docente successive (registro, scrutinio, reset, ecc.) vengano eseguite senza dover reinserire il codice ogni volta. Al logout il codice viene rimosso.
        </div>

        <button className="btn btn-ghost btn-sm" onClick={onBack} style={{ marginTop: 16 }}>← Torna alla landing</button>
      </div>
    </div>
  );
}
